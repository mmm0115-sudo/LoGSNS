<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#ffffff" />
  <title>LoG SNS</title>

  <link rel="icon" type="image/png" href="logo-icon.png" />
  <link rel="apple-touch-icon" href="logo-icon.png" />

  <link rel="stylesheet" href="assets/css/tailwind.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --text: #0f1419;
      --card: #ffffff;
      --border: #eff3f4;
      --sub: #536471;
      --accent: #1d9bf0;
      --danger: #f4212e;
      --success: #00ba7c;
      --nav: rgba(255,255,255,.94);
    }

    .dark {
      --bg: #000000;
      --text: #e7e9ea;
      --card: #000000;
      --border: #2f3336;
      --sub: #71767b;
      --nav: rgba(0,0,0,.94);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, 'Noto Sans JP', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: none;
    }

    * { box-sizing: border-box; }
    button, input, textarea { font: inherit; }
    button {
      border: 0;
      background: transparent;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    img, svg { max-width: 100%; }
    .hidden { display: none !important; }

    .app-shell {
      min-height: 100vh;
      min-height: 100dvh;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 900;
      font-size: .9rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-soft {
      background: rgba(239, 243, 244, .72);
      background: color-mix(in srgb, var(--border) 72%, transparent);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 800;
      font-size: .85rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .dark .btn-soft {
      background: rgba(47, 51, 54, .72);
      background: color-mix(in srgb, var(--border) 72%, transparent);
    }

    .btn-ghost {
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--sub);
      border-radius: 999px;
      padding: 7px 10px;
    }

    .btn-ghost:active,
    .post:active { background: rgba(128,128,128,.08); }

    .nav-item {
      color: var(--sub);
      padding: 10px;
      border-radius: 999px;
      position: relative;
      min-width: 54px;
      min-height: 48px;
      display: grid;
      place-items: center;
    }

    .nav-active {
      color: var(--text);
      transform: scale(1.06);
    }

    .nav-badge {
      position: absolute;
      top: 9px;
      right: 12px;
      width: 9px;
      height: 9px;
      background: var(--danger);
      border-radius: 999px;
      display: none;
    }

    .post {
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      cursor: pointer;
      contain: content;
      overflow-x: hidden;
      background: var(--bg);
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-block;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: .62rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .auth-benefit {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: left;
      background: rgba(239, 243, 244, .3);
      background: color-mix(in srgb, var(--border) 30%, transparent);
    }

    .dark .auth-benefit {
      background: rgba(47, 51, 54, .3);
      background: color-mix(in srgb, var(--border) 30%, transparent);
    }

    .invite-link-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--border) 28%, transparent);
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
    }

    .bg-\[var\(--border\)\]\/10 { background: rgba(239, 243, 244, .1); background: color-mix(in srgb, var(--border) 10%, transparent); }
    .bg-\[var\(--border\)\]\/20 { background: rgba(239, 243, 244, .2); background: color-mix(in srgb, var(--border) 20%, transparent); }
    .bg-\[var\(--border\)\]\/30 { background: rgba(239, 243, 244, .3); background: color-mix(in srgb, var(--border) 30%, transparent); }
    .bg-\[var\(--border\)\]\/50 { background: rgba(239, 243, 244, .5); background: color-mix(in srgb, var(--border) 50%, transparent); }
    .bg-\[var\(--accent\)\]\/10 { background: rgba(29, 155, 240, .1); background: color-mix(in srgb, var(--accent) 10%, transparent); }
    .hover\:bg-\[var\(--border\)\]\/20:hover { background: rgba(239, 243, 244, .2); background: color-mix(in srgb, var(--border) 20%, transparent); }
    .hover\:bg-\[var\(--border\)\]\/50:hover { background: rgba(239, 243, 244, .5); background: color-mix(in srgb, var(--border) 50%, transparent); }
    .dark .bg-\[var\(--border\)\]\/10 { background: rgba(47, 51, 54, .1); background: color-mix(in srgb, var(--border) 10%, transparent); }
    .dark .bg-\[var\(--border\)\]\/20 { background: rgba(47, 51, 54, .2); background: color-mix(in srgb, var(--border) 20%, transparent); }
    .dark .bg-\[var\(--border\)\]\/30 { background: rgba(47, 51, 54, .3); background: color-mix(in srgb, var(--border) 30%, transparent); }
    .dark .bg-\[var\(--border\)\]\/50 { background: rgba(47, 51, 54, .5); background: color-mix(in srgb, var(--border) 50%, transparent); }
    .dark .hover\:bg-\[var\(--border\)\]\/20:hover { background: rgba(47, 51, 54, .2); background: color-mix(in srgb, var(--border) 20%, transparent); }
    .dark .hover\:bg-\[var\(--border\)\]\/50:hover { background: rgba(47, 51, 54, .5); background: color-mix(in srgb, var(--border) 50%, transparent); }

    .title-badge {
      background: linear-gradient(135deg, #ffd54a, #ff8a00);
      color: #fff;
    }

    .admin-badge {
      background: linear-gradient(135deg, #111, #666);
      color: #fff;
    }

    .modal-overlay {
      background: rgba(0,0,0,.68);
      backdrop-filter: blur(6px);
    }

    .toast {
      position: fixed;
      bottom: 86px;
      left: 50%;
      transform: translateX(-50%) translateY(18px);
      background: rgba(0,0,0,.84);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: .86rem;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: .25s;
      z-index: 200;
      white-space: nowrap;
      max-width: calc(100vw - 28px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .dm-bubble {
      max-width: 78%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
      display: inline-block;
      box-shadow: 0 0 10px var(--success);
    }

    .quote-text {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      overflow: hidden;
    }

    #chat-messages,
    #thread-posts {
      -webkit-overflow-scrolling: touch;
      overflow-x: hidden;
    }

    #tab-chat {
      height: calc(100vh - 132px);
      height: calc(100dvh - 132px);
      min-height: 0;
    }

    @media (max-width: 640px) {
      input,
      textarea {
        font-size: 16px !important;
      }

      .btn-soft,
      .btn-primary {
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>

</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="app-shell max-w-2xl mx-auto bg-[var(--bg)] shadow-2xl relative pb-24 border-x border-[var(--border)] overflow-x-hidden">
    <header class="sticky top-0 bg-[var(--nav)] backdrop-blur-md z-40 border-b border-[var(--border)] px-4 py-3 flex justify-between items-center">
      <button onclick="switchTab('profile')" class="w-11 h-11 rounded-full grid place-items-center" aria-label="プロフィールを開く">
        <img id="header-icon" src="logo-icon.png" alt="" class="w-9 h-9 rounded-full object-cover bg-gray-100 border border-[var(--border)]" />
      </button>
      <button class="flex items-center justify-center" onclick="switchTab('home')" aria-label="LoG Home">
        <img id="header-logo" src="logo-main.png" alt="LoG" class="h-8 object-contain" />
      </button>
      <button onclick="reloadNewestPosts()" class="btn-soft text-xs flex items-center gap-1">
        <span class="material-icons-round text-base">refresh</span>更新
      </button>
    </header>
<main>
  <section id="tab-home" class="pb-24">
    <div class="p-4 border-b border-[var(--border)]">
      <div class="flex gap-3">
        <img id="input-icon" src="logo-icon.png" alt="" class="w-10 h-10 rounded-full bg-gray-100 object-cover flex-shrink-0" />
        <div class="flex-1 min-w-0" onclick="requireAuth()">
          <textarea id="post-text" rows="2" placeholder="いまどうしてる？" class="w-full text-lg resize-none bg-transparent outline-none placeholder-[var(--sub)]" readonly></textarea>
          <div id="quote-preview" class="hidden mb-3 p-3 rounded-xl border border-[var(--border)] text-sm relative">
            <button onclick="event.stopPropagation(); cancelQuote()" class="absolute top-1 right-2 text-[var(--sub)]">×</button>
            <div class="font-bold mb-1" id="quote-target-name"></div>
            <div class="truncate text-[var(--sub)]" id="quote-target-text"></div>
          </div>
          <div class="flex justify-end items-center pt-2 border-t border-[var(--border)]">
            <button id="post-btn" class="btn-primary pointer-events-none">ポスト</button>
          </div>
        </div>
      </div>
    </div>

    <div id="new-post-notice" class="hidden mx-4 mt-3 p-3 rounded-2xl bg-blue-500/10 border border-blue-500/20 text-sm font-bold text-blue-500"></div>

    <div class="p-3 border-b border-[var(--border)] flex gap-2">
      <button onclick="reloadNewestPosts()" class="flex-1 btn-soft">新しいポストを読み込む</button>
      <button onclick="loadMorePosts()" class="flex-1 btn-soft">さらに10件</button>
    </div>

    <div id="timeline"></div>
  </section>

  <section id="tab-explore" class="hidden pb-24">
    <div class="p-3 border-b border-[var(--border)] sticky top-14 bg-[var(--bg)] z-30">
      <div class="bg-[var(--border)]/50 rounded-full px-4 py-2 flex items-center text-[var(--sub)]">
        <span class="material-icons-round mr-2 text-sm">search</span>
        <input id="search-input" type="text" placeholder="ユーザー検索" class="bg-transparent w-full outline-none text-sm" onkeyup="searchUsers()" />
      </div>
    </div>
    <div class="p-2 border-b border-[var(--border)] bg-[var(--border)]/10 text-xs font-bold text-[var(--sub)] text-center tracking-widest uppercase">Users</div>
    <div id="explore-list" class="divide-y divide-[var(--border)]"></div>
  </section>

  <section id="tab-dm" class="hidden p-4 pb-24">
    <div class="flex justify-between items-center mb-4 gap-2">
      <div>
        <h2 class="text-2xl font-black">DM</h2>
        <p class="text-xs text-[var(--sub)]"><span class="live-dot"></span> DMはリアルタイム</p>
      </div>
      <button onclick="startDMListWatcher(true)" class="btn-soft flex-shrink-0">再接続</button>
    </div>
    <div id="dm-list" class="space-y-2"></div>
  </section>

  <section id="tab-notif" class="hidden pb-24">
    <div class="p-3 border-b border-[var(--border)] font-bold text-lg px-4 flex justify-between items-center">
      <span>通知</span>
      <button onclick="loadNotifications(true)" class="btn-soft text-xs">更新</button>
    </div>
    <div id="notif-list" class="divide-y divide-[var(--border)]"></div>
  </section>

  <section id="tab-profile" class="hidden pb-24">
    <div class="px-4 py-6">
      <div class="flex justify-between items-start mb-4">
        <img id="profile-big-icon" src="logo-icon.png" alt="" class="w-20 h-20 rounded-full border-4 border-[var(--bg)] bg-[var(--bg)] object-cover shadow-sm" />
        <div class="flex gap-2">
          <button onclick="rerollIcon()" class="btn-soft">アイコン変更</button>
          <button onclick="openSettings()" class="btn-primary bg-transparent text-[var(--text)] border border-[var(--border)]">設定</button>
        </div>
      </div>

      <h2 class="text-2xl font-black leading-tight flex items-center gap-2 flex-wrap">
        <span id="profile-name"></span>
        <span id="profile-title" class="badge title-badge hidden"></span>
        <span id="profile-admin" class="badge admin-badge hidden">ADMIN</span>
      </h2>

      <p id="profile-uid" class="text-sm text-[var(--sub)] font-mono">@user</p>

      <div class="flex items-center gap-4 mt-3">
        <div><span class="font-bold" id="profile-xp">0</span> <span class="text-xs text-[var(--sub)]">XP</span></div>
        <div id="profile-rank" class="text-sm font-black"></div>
      </div>

      <div class="mt-4 p-4 border border-[var(--border)] rounded-2xl">
        <div class="font-black text-sm mb-3">Missions</div>
        <div id="mission-list" class="space-y-2"></div>
      </div>

      <div class="mt-4 p-4 border border-[var(--border)] rounded-2xl">
        <div class="flex justify-between items-start gap-3 mb-3">
          <div>
            <div class="font-black text-sm">招待プログラム</div>
            <div class="text-xs text-[var(--sub)] mt-1">
              参加数 <span id="invite-count" class="font-bold text-[var(--text)]">0</span>人
            </div>
          </div>
          <span class="badge title-badge">GROW</span>
        </div>
        <div class="flex gap-2">
          <input id="invite-link" class="invite-link-input" readonly aria-label="招待リンク" />
          <button onclick="copyInviteLink()" class="btn-soft flex-shrink-0">コピー</button>
        </div>
        <button onclick="shareInviteLink()" class="w-full btn-primary mt-3">SNSで共有</button>
      </div>
    </div>

    <div class="flex border-y border-[var(--border)] sticky top-14 bg-[var(--bg)] z-20">
      <button onclick="switchProfileSubTab('posts')" id="tab-btn-posts" class="flex-1 text-center py-3 font-bold border-b-2 border-[var(--text)]">ポスト</button>
      <button onclick="switchProfileSubTab('likes')" id="tab-btn-likes" class="flex-1 text-center py-3 font-bold text-[var(--sub)]">いいね</button>
    </div>
    <div id="my-timeline" class="divide-y divide-[var(--border)]"></div>
  </section>

  <section id="tab-other-profile" class="hidden pb-24">
    <div class="p-3 border-b border-[var(--border)] flex items-center gap-4 sticky top-14 bg-[var(--bg)] z-30">
      <button onclick="switchTab('explore')"><span class="material-icons-round">arrow_back</span></button>
      <span class="font-bold">プロフィール</span>
    </div>

    <div class="px-4 py-6">
      <div class="flex justify-between items-start mb-4">
        <img id="other-icon" src="logo-icon.png" alt="" class="w-20 h-20 rounded-full border-4 border-[var(--bg)] object-cover shadow-sm" />
        <div class="flex gap-2">
          <button id="other-dm-btn" class="btn-primary bg-transparent text-[var(--text)] border border-[var(--border)]" aria-label="DMを開く">
            <span class="material-icons-round text-lg">mail</span>
          </button>
          <button id="other-follow-btn" class="btn-primary">フォロー</button>
        </div>
      </div>

      <h2 class="text-2xl font-black leading-tight flex items-center gap-2 flex-wrap">
        <span id="other-name"></span>
        <span id="other-title" class="badge title-badge hidden"></span>
      </h2>
      <p id="other-uid" class="text-sm text-[var(--sub)] font-mono"></p>

      <div class="flex items-center gap-4 mt-3">
        <div><span class="font-bold" id="other-xp">0</span> <span class="text-xs text-[var(--sub)]">XP</span></div>
        <div id="other-rank" class="font-bold"></div>
      </div>
    </div>

    <div class="border-b border-[var(--border)] font-bold px-4 py-2 text-sm">ポスト</div>
    <div id="other-timeline" class="divide-y divide-[var(--border)]"></div>
  </section>

  <section id="tab-chat" class="hidden flex flex-col overflow-hidden">
    <div class="p-3 border-b border-[var(--border)] flex items-center justify-between sticky top-14 bg-[var(--bg)] z-10 px-4 gap-2">
      <div class="flex items-center gap-3 min-w-0">
        <button onclick="switchTab('dm')"><span class="material-icons-round text-2xl">arrow_back</span></button>
        <span id="chat-target-name" class="font-bold text-lg truncate"></span>
      </div>
      <div class="text-[10px] text-[var(--sub)] flex items-center gap-1"><span class="live-dot"></span> LIVE</div>
    </div>

    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2 bg-[var(--bg)]"></div>

    <div class="p-3 border-t border-[var(--border)] bg-[var(--bg)] flex gap-2 items-center pb-[calc(env(safe-area-inset-bottom)+12px)]">
      <input id="chat-input" type="text" class="flex-1 min-w-0 bg-[var(--border)]/50 rounded-full px-4 py-2 text-sm outline-none" placeholder="メッセージを作成" />
      <button id="chat-send-btn" class="text-blue-500 p-2 font-bold" aria-label="送信"><span class="material-icons-round">send</span></button>
    </div>
  </section>
</main>

<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-[var(--nav)] border-t border-[var(--border)] flex justify-around py-3 z-50 backdrop-blur pb-[calc(env(safe-area-inset-bottom)+12px)]">
  <button onclick="switchTab('home')" class="nav-item nav-active" data-target="home" aria-label="ホーム"><span class="material-icons-round text-3xl">home</span></button>
  <button onclick="switchTab('explore')" class="nav-item" data-target="explore" aria-label="検索"><span class="material-icons-round text-3xl">search</span></button>
  <button onclick="switchTab('dm')" class="nav-item" data-target="dm" aria-label="DM"><span class="material-icons-round text-3xl">mail</span></button>
  <button onclick="switchTab('notif')" class="nav-item" data-target="notif" aria-label="通知"><span class="material-icons-round text-3xl">notifications</span><div id="nav-badge" class="nav-badge"></div></button>
  <button onclick="switchTab('profile')" class="nav-item" data-target="profile" aria-label="プロフィール"><span class="material-icons-round text-3xl">person</span></button>
</nav>

  </div>

  <div id="auth-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-[var(--card)] p-8 rounded-3xl w-full max-w-sm shadow-2xl border border-[var(--border)] text-center relative">
      <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-[var(--sub)]"><span class="material-icons-round">close</span></button>
      <img src="logo-main.png" alt="LoG" class="h-20 mx-auto mb-3 object-contain" />
      <h1 class="text-2xl font-black mb-2">LoGをはじめよう</h1>
      <p class="text-[var(--sub)] text-sm mb-4">ログインすると投稿、DM、ミッション、招待が使えます。</p>
      <div id="invite-auth-note" class="hidden p-3 mb-4 rounded-2xl bg-blue-500/10 border border-blue-500/20 text-sm font-bold text-blue-500"></div>
      <div class="space-y-2 mb-6">
        <div class="auth-benefit">
          <span class="material-icons-round text-blue-500 text-lg">rocket_launch</span>
          <div>
            <div class="font-bold text-sm">新規ミッション</div>
            <div class="text-xs text-[var(--sub)]">初投稿、フォロー、いいねでXPを獲得</div>
          </div>
        </div>
        <div class="auth-benefit">
          <span class="material-icons-round text-blue-500 text-lg">group_add</span>
          <div>
            <div class="font-bold text-sm">招待リンク</div>
            <div class="text-xs text-[var(--sub)]">SNSで共有して参加者を増やせます</div>
          </div>
        </div>
      </div>
      <div class="space-y-4">
        <button id="google-login-btn" class="w-full border border-[var(--border)] py-3 rounded-full font-bold flex justify-center items-center gap-3">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" />Googleで続行
        </button>
        <div class="space-y-3 pt-4 border-t border-[var(--border)]">
          <input id="auth-email" type="email" placeholder="Email" class="w-full bg-[var(--border)]/30 border border-[var(--border)] rounded-xl p-3 outline-none" />
          <input id="auth-password" type="password" placeholder="Password" class="w-full bg-[var(--border)]/30 border border-[var(--border)] rounded-xl p-3 outline-none" />
          <div class="flex gap-2">
            <button onclick="emailAuth('login')" class="flex-1 btn-primary py-3">ログイン</button>
            <button onclick="emailAuth('signup')" class="flex-1 border border-[var(--border)] py-3 rounded-full font-bold">新規登録</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="profile-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-[var(--card)] p-6 rounded-2xl w-full max-w-sm shadow-2xl border border-[var(--border)] text-center">
      <h2 class="text-xl font-black mb-2">プロフィール作成</h2>
      <div id="profile-invite-note" class="hidden p-3 mb-4 rounded-2xl bg-blue-500/10 border border-blue-500/20 text-sm font-bold text-blue-500"></div>
      <input id="edit-name-input" type="text" class="w-full bg-[var(--border)]/30 rounded-xl border border-[var(--border)] p-4 mb-4 font-bold outline-none" placeholder="表示名" />
      <button onclick="saveProfile()" class="w-full btn-primary py-4 text-lg font-black">開始</button>
    </div>
  </div>

  <div id="reply-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-[var(--card)] p-6 rounded-2xl w-full max-w-md shadow-2xl border border-[var(--border)]">
      <h2 class="text-xl font-black mb-4">リプライ</h2>
      <div id="reply-target" class="text-sm text-[var(--sub)] mb-3"></div>
      <textarea id="reply-input" rows="4" class="w-full bg-[var(--border)]/30 rounded-xl p-3 mb-4 text-sm outline-none resize-none" placeholder="返信を書く"></textarea>
      <div class="flex gap-2">
        <button onclick="closeReplyModal()" class="flex-1 py-3 text-sm font-bold text-[var(--sub)]">キャンセル</button>
        <button onclick="sendReply()" class="flex-1 btn-primary py-3">送信</button>
      </div>
    </div>
  </div>

  <div id="thread-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-[var(--card)] w-full max-w-xl rounded-2xl overflow-hidden border border-[var(--border)] max-h-[90vh] flex flex-col">
      <div class="p-4 border-b border-[var(--border)] flex justify-between items-center">
        <div class="font-black text-lg">スレッド</div>
        <button onclick="document.getElementById('thread-modal').classList.add('hidden')"><span class="material-icons-round">close</span></button>
      </div>
      <div id="thread-posts" class="overflow-y-auto flex-1"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-[var(--card)] p-6 rounded-2xl w-80 shadow-2xl border border-[var(--border)]">
      <button onclick="toggleDarkMode()" class="w-full flex justify-between items-center p-3 font-bold mb-2 rounded-lg hover:bg-[var(--border)]/50">ダークモード<span class="material-icons-round">dark_mode</span></button>
      <button onclick="setAdmin()" class="w-full flex justify-between items-center p-3 font-bold mb-2 rounded-lg hover:bg-[var(--border)]/50">管理者権限<span class="material-icons-round">admin_panel_settings</span></button>
      <button onclick="signOutApp()" class="w-full text-left p-3 text-[var(--danger)] font-bold rounded-lg hover:bg-red-500/10">ログアウト</button>
      <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="mt-4 w-full py-2 text-sm font-bold text-[var(--sub)]">閉じる</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove, deleteDoc, increment, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const LOGO_MAIN = "logo-main.png";
    const LOGO_ICON = "logo-icon.png";

    const firebaseConfig = {
      apiKey: "AIzaSyCA4NQzxcz2gh8uaw3LKrKl_NEnE_fMybs",
      authDomain: "lo-g-8a620.firebaseapp.com",
      projectId: "lo-g-8a620",
      storageBucket: "lo-g-8a620.firebasestorage.app",
      messagingSenderId: "780857099698",
      appId: "1:780857099698:web:b6cb359114da98ab3e50ab"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let myProfile = null;
    let currentProfileTab = "posts";
    let currentChatUser = null;
    let currentChatName = "";
    let currentReplyPost = null;
    let currentReplyAuthor = "";
    let quoteData = null;
    let postLimit = 10;
    let notificationTimer = null;
    let dmRoomsUnsub = null;
    let chatUnsub = null;
    let postNoticeUnsub = null;
    let lastSeenTopPostId = null;
    let toastTimer = null;
    let pendingReferralUid = "";

    const STARTER_MISSIONS = [
      { type: "post", label: "初ポストで自己紹介", target: 1, xp: 150 },
      { type: "like", label: "気になる投稿に3いいね", target: 3, xp: 120 },
      { type: "follow", label: "3人フォロー", target: 3, xp: 180 },
      { type: "inviteShare", label: "招待リンクをコピー", target: 1, xp: 120 },
      { type: "inviteAccepted", label: "友だち1人を招待", target: 1, xp: 500 }
    ];

    const MISSIONS = [
      { type: "post", label: "2回ポスト", target: 2, xp: 180 },
      { type: "like", label: "5回いいね", target: 5, xp: 120 },
      { type: "follow", label: "2人フォロー", target: 2, xp: 160 },
      { type: "reply", label: "3回リプライ", target: 3, xp: 220 },
      { type: "dm", label: "5回DM送信", target: 5, xp: 280 },
      { type: "inviteShare", label: "招待リンクを共有", target: 1, xp: 140 },
      { type: "inviteAccepted", label: "友だちを招待", target: 1, xp: 520 }
    ];

    const $ = id => document.getElementById(id);

    const showToast = msg => {
      const toast = $("toast");
      toast.innerText = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2600);
    };

    const authErr = e => showToast("Error: " + (e.message || e));

    const escapeHtml = (v = "") => String(v).replace(/[&<>"]/g, s => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;"
    }[s]));

    const escapeAttr = (v = "") => escapeHtml(v).replace(/'/g, "&#39;").replace(/`/g, "&#96;");
    const encodeForHandler = (v = "") => encodeURIComponent(String(v));
    const roomIdFor = (a, b) => [a, b].sort().join("_");
    const toDate = ts => ts?.toDate ? ts.toDate() : ts ? new Date(ts) : null;
    const validReferralUid = uid => typeof uid === "string" && /^[A-Za-z0-9_-]{8,128}$/.test(uid);

    function captureReferral() {
      const params = new URLSearchParams(location.search);
      const ref = (params.get("ref") || params.get("invite") || "").trim();
      if (validReferralUid(ref)) {
        localStorage.setItem("pendingReferralUid", ref);
        pendingReferralUid = ref;
      } else {
        const stored = localStorage.getItem("pendingReferralUid") || "";
        pendingReferralUid = validReferralUid(stored) ? stored : "";
      }
      updateAuthReferralNote();
    }

    function updateAuthReferralNote() {
      const note = $("invite-auth-note");
      const profileNote = $("profile-invite-note");
      if (note) {
        note.classList.toggle("hidden", !pendingReferralUid);
        if (pendingReferralUid) note.innerText = "招待リンクから参加中。プロフィール作成で招待が記録されます。";
      }
      if (profileNote) {
        profileNote.classList.toggle("hidden", !pendingReferralUid);
        if (pendingReferralUid) profileNote.innerText = "招待参加ボーナス +80XP";
      }
    }

    function inviteUrlFor(uid = currentUser?.uid) {
      if (!uid) return "";
      const url = new URL(location.href);
      url.search = "";
      url.hash = "";
      url.searchParams.set("ref", uid);
      return url.toString();
    }

    function updateInviteUI() {
      if (!currentUser || !myProfile) return;
      const inviteInput = $("invite-link");
      const inviteCount = $("invite-count");
      if (inviteInput) inviteInput.value = inviteUrlFor();
      if (inviteCount) inviteCount.innerText = myProfile.referralCount || 0;
    }

    const formatTime = ts => {
      const d = toDate(ts);
      if (!d || Number.isNaN(d.getTime())) return "たった今";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(d);
    };

    const isAdmin = () => !!myProfile?.adminMode;
    const rank = xp => xp >= 1000 ? "Gold" : xp >= 400 ? "Silver" : xp >= 100 ? "Bronze" : "Unranked";

    window.requireAuth = () => {
      if (currentUser) return true;
      openAuthModal();
      return false;
    };

    function openAuthModal() {
      updateAuthReferralNote();
      $("auth-modal").classList.remove("hidden");
    }

    window.closeAuthModal = () => $("auth-modal").classList.add("hidden");

    $("google-login-btn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(authErr);

    window.emailAuth = mode => {
      const email = $("auth-email").value.trim();
      const password = $("auth-password").value;
      if (!email || !password) return showToast("メールとパスワードを入力して");

      if (mode === "login") {
        signInWithEmailAndPassword(auth, email, password).catch(authErr);
      } else {
        createUserWithEmailAndPassword(auth, email, password).catch(authErr);
      }
    };

    captureReferral();

    onAuthStateChanged(auth, async user => {
      if (!user) {
        stopRealtime();
        currentUser = null;
        myProfile = null;
        initGuest(true);
        return;
      }

      currentUser = user;
      closeAuthModal();

      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) {
        initGuest(false);
        $("profile-modal").classList.remove("hidden");
        return;
      }

      myProfile = normalizeProfile(snap.data());
      await ensureMissions();
      initLoggedIn();
    });

    function normalizeProfile(profile) {
      return {
        following: [],
        xp: 0,
        title: "見習い",
        adminMode: false,
        referralCount: 0,
        referredBy: "",
        ...profile
      };
    }

    function stopRealtime() {
      dmRoomsUnsub?.();
      chatUnsub?.();
      postNoticeUnsub?.();
      clearInterval(notificationTimer);
      dmRoomsUnsub = null;
      chatUnsub = null;
      postNoticeUnsub = null;
    }

    function initGuest(showLogin = true) {
      document.body.classList.toggle("dark", localStorage.getItem("theme") === "dark");
      $("header-icon").src = LOGO_ICON;
      $("input-icon").src = LOGO_ICON;
      $("post-text").setAttribute("readonly", "true");
      $("post-text").style.pointerEvents = "none";
      $("post-btn").style.pointerEvents = "none";
      loadTimeline();
      loadRanking();
      if (showLogin) openAuthModal();
    }

    function initLoggedIn() {
      document.body.classList.toggle("dark", localStorage.getItem("theme") === "dark");
      $("post-text").removeAttribute("readonly");
      $("post-text").style.pointerEvents = "auto";
      $("post-btn").style.pointerEvents = "auto";
      updateMyProfileUI();
      loadTimeline();
      loadRanking();
      loadNotifications(false);
      startPostNoticeWatcher();
      clearInterval(notificationTimer);
      notificationTimer = setInterval(() => loadNotifications(false), 30000);
    }

    function updateMyProfileUI() {
      if (!myProfile || !currentUser) return;
      const icon = myProfile.icon || LOGO_ICON;

      $("header-icon").src = icon;
      $("input-icon").src = icon;
      $("profile-big-icon").src = icon;
      $("profile-name").innerText = myProfile.name || "名無し";
      $("profile-uid").innerText = "@" + currentUser.uid.slice(0, 8);
      $("profile-xp").innerText = isAdmin() ? "∞" : myProfile.xp || 0;
      $("profile-rank").innerText = rank(myProfile.xp || 0);
      updateInviteUI();

      if (myProfile.title) {
        $("profile-title").innerText = myProfile.title;
        $("profile-title").classList.remove("hidden");
      } else {
        $("profile-title").classList.add("hidden");
      }

      $("profile-admin").classList.toggle("hidden", !isAdmin());
      renderMissions();
    }

    async function ensureMissions() {
      if (currentUser && myProfile && (!Array.isArray(myProfile.activeMissions) || !myProfile.activeMissions.length)) {
        myProfile.activeMissions = STARTER_MISSIONS.map((m, i) => ({ ...m, id: `starter_${m.type}_${i}`, progress: 0 }));
        await setDoc(doc(db, "users", currentUser.uid), { activeMissions: myProfile.activeMissions }, { merge: true });
      }
    }

    function renderMissions() {
      const list = $("mission-list");
      if (!list || !myProfile) return;

      list.innerHTML = (myProfile.activeMissions || []).map(m => {
        const p = Math.min(100, Math.round(((m.progress || 0) / m.target) * 100));
        return `
          <div class="bg-[var(--border)]/20 rounded-xl p-3 text-xs">
            <div class="flex justify-between mb-1">
              <span class="font-bold">${escapeHtml(m.label)}</span>
              <span>${m.progress || 0}/${m.target}</span>
            </div>
            <div class="h-1.5 bg-[var(--border)] rounded-full overflow-hidden">
              <div class="h-full bg-[var(--success)]" style="width:${p}%"></div>
            </div>
            <div class="mt-1 text-[10px] text-[var(--sub)]">報酬 ${m.xp} XP</div>
          </div>
        `;
      }).join("");
    }

    function advanceMissions(profile, type) {
      let xpAdd = 0;
      let changed = false;

      const activeMissions = Array.isArray(profile.activeMissions) && profile.activeMissions.length
        ? profile.activeMissions
        : STARTER_MISSIONS.map((m, i) => ({ ...m, id: `starter_${m.type}_${i}`, progress: 0 }));

      const next = activeMissions.map(m => {
        if (m.type !== type) return m;
        changed = true;
        const updated = { ...m, progress: (m.progress || 0) + 1 };
        if (updated.progress >= updated.target) {
          xpAdd += updated.xp;
          const replacement = MISSIONS[Math.floor(Math.random() * MISSIONS.length)];
          return { ...replacement, id: `m_${Date.now()}_${Math.random()}`, progress: 0 };
        }
        return updated;
      });

      return { changed, next, xpAdd };
    }

    async function progressMission(type) {
      if (!currentUser || !myProfile) return;
      const { changed, next, xpAdd } = advanceMissions(myProfile, type);
      if (!changed) return;

      myProfile.activeMissions = next;
      const updates = { activeMissions: next };

      if (xpAdd && !isAdmin()) {
        updates.xp = increment(xpAdd);
        myProfile.xp = (myProfile.xp || 0) + xpAdd;
        showToast(`ミッション達成 +${xpAdd}XP`);
      }

      await updateDoc(doc(db, "users", currentUser.uid), updates);
      updateMyProfileUI();
    }

    async function progressMissionForUser(uid, type) {
      if (!uid || uid === currentUser?.uid) return false;
      const ref = doc(db, "users", uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) return false;

      const profile = normalizeProfile(snap.data());
      const { changed, next, xpAdd } = advanceMissions(profile, type);
      const updates = { referralCount: increment(1) };

      if (changed) updates.activeMissions = next;
      if (xpAdd && !profile.adminMode) updates.xp = increment(xpAdd);

      await updateDoc(ref, updates);
      return true;
    }

    $("post-btn").onclick = async () => {
      if (!requireAuth()) return;
      const text = $("post-text").value.trim();
      if (!text) return;

      const exp = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000);

      await addDoc(collection(db, "logs"), {
        text,
        uid: currentUser.uid,
        authorName: myProfile.name || "名無し",
        authorIcon: myProfile.icon || LOGO_ICON,
        authorTitle: myProfile.title || "",
        quoteName: quoteData?.name || "",
        quoteText: quoteData?.text || "",
        createdAt: serverTimestamp(),
        expireAt: exp,
        likes: [],
        replyCount: 0,
        isReply: false
      });

      if (!isAdmin()) {
        await updateDoc(doc(db, "users", currentUser.uid), { xp: increment(15) });
        myProfile.xp = (myProfile.xp || 0) + 15;
      }

      await progressMission("post");
      await notifyFollowersPost(text);
      $("post-text").value = "";
      cancelQuote();
      updateMyProfileUI();
      showToast("投稿しました。更新で反映");
    };

    async function notifyFollowersPost(text) {
      try {
        const snap = await getDocs(query(collection(db, "users"), where("following", "array-contains", currentUser.uid), limit(30)));
        const jobs = [];
        const exp = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000);

        snap.forEach(d => {
          if (d.id !== currentUser.uid) {
            jobs.push(addDoc(collection(db, "notif"), {
              to: d.id,
              from: myProfile.name || "名無し",
              fromUid: currentUser.uid,
              type: "post",
              text: text.slice(0, 80),
              read: false,
              createdAt: serverTimestamp(),
              expireAt: exp
            }));
          }
        });

        await Promise.all(jobs);
      } catch (e) {
        console.warn(e);
      }
    }

    function startPostNoticeWatcher() {
      if (!currentUser) return;
      postNoticeUnsub?.();

      postNoticeUnsub = onSnapshot(query(collection(db, "logs"), orderBy("createdAt", "desc"), limit(1)), snap => {
        if (snap.empty) return;
        const d = snap.docs[0];
        const data = d.data();

        if (!lastSeenTopPostId) {
          lastSeenTopPostId = d.id;
          return;
        }

        if (d.id === lastSeenTopPostId || data.isReply || data.replyTo || data.uid === currentUser.uid) return;

        lastSeenTopPostId = d.id;
        $("new-post-notice").innerHTML = `${escapeHtml(data.authorName || "誰か")}さんが新しく投稿しました。<button onclick="reloadNewestPosts()" class="underline ml-2">読み込む</button>`;
        $("new-post-notice").classList.remove("hidden");
      });
    }

    window.reloadNewestPosts = () => {
      postLimit = 10;
      $("new-post-notice").classList.add("hidden");
      loadTimeline();
    };

    window.loadMorePosts = () => {
      postLimit += 10;
      loadTimeline();
    };

    async function loadTimeline() {
      const timeline = $("timeline");
      timeline.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">読み込み中...</div>';

      try {
        const snap = await getDocs(query(collection(db, "logs"), orderBy("createdAt", "desc"), limit(Math.max(30, postLimit * 3))));
        let html = "";
        let count = 0;

        snap.forEach(d => {
          const data = d.data();
          if (!lastSeenTopPostId && !data.isReply && !data.replyTo) lastSeenTopPostId = d.id;
          if (data.isReply || data.replyTo || count >= postLimit) return;
          html += buildPostHTML(d.id, data);
          count++;
        });

        timeline.innerHTML = html || '<div class="p-8 text-center text-sm text-[var(--sub)]">まだポストがありません</div>';
        timeline.innerHTML += '<div class="p-6 text-center"><button onclick="loadMorePosts()" class="px-6 py-3 rounded-full bg-[var(--border)] font-bold">さらに10件読み込む</button></div>';
      } catch (e) {
        const message = e.code === "permission-denied"
          ? "ログインするとタイムラインを表示できます。"
          : `読み込み失敗: ${escapeHtml(e.message)}`;
        timeline.innerHTML = `<div class="p-6 text-center text-sm text-[var(--sub)]">${message}</div>`;
      }

      if (currentUser && currentProfileTab === "posts") loadMyPosts(false);
    }

    function buildPostHTML(id, d, isPin = false, inThread = false) {
      const liked = currentUser && Array.isArray(d.likes) && d.likes.includes(currentUser.uid);
      const safeText = escapeHtml(d.text || "");
      const safeAuthor = escapeHtml(d.authorName || "名無し");
      const safeTitle = escapeHtml(d.authorTitle || "");
      const safeUid = escapeHtml((d.uid || "").slice(0, 8));
      const quoteText = encodeForHandler(d.text || "");
      const quoteName = encodeForHandler(d.authorName || "名無し");
      const quotedPost = d.quoteText ? `
        <div class="mt-3 rounded-2xl border border-[var(--border)] p-3 text-sm bg-[var(--border)]/10">
          <div class="font-bold mb-1">${escapeHtml(d.quoteName || "引用")}</div>
          <div class="quote-text text-[var(--sub)] whitespace-pre-wrap break-words">${escapeHtml(d.quoteText)}</div>
        </div>
      ` : "";
      const canDelete = currentUser && (d.uid === currentUser.uid || isAdmin());
      const click = inThread ? "" : `onclick="openThread('${id}')"`;

      return `
        <article class="post flex gap-3" ${click}>
          <img src="${escapeAttr(d.authorIcon || LOGO_ICON)}" class="w-10 h-10 rounded-full object-cover flex-shrink-0 cursor-pointer" onclick="event.stopPropagation(); viewUser('${escapeAttr(d.uid || "")}')" />
          <div class="flex-1 min-w-0 overflow-hidden">
            <div class="flex justify-between items-start gap-2">
              <div class="min-w-0">
                <div class="flex items-center gap-1 min-w-0 flex-wrap">
                  <button class="font-bold text-[15px] truncate hover:underline" onclick="event.stopPropagation(); viewUser('${escapeAttr(d.uid || "")}')">${safeAuthor}</button>
                  ${safeTitle ? `<span class="badge title-badge">${safeTitle}</span>` : ""}
                  <span class="text-[var(--sub)] text-sm truncate">@${safeUid}</span>
                </div>
                <div class="text-xs text-[var(--sub)] mt-0.5">${formatTime(d.createdAt)}</div>
              </div>
              ${canDelete && !isPin ? `<button onclick="event.stopPropagation(); del('${id}')" class="text-[var(--danger)] text-xs font-bold px-2 py-1 rounded-full bg-red-500/10">削除</button>` : ""}
            </div>
            ${d.isReply ? `<div class="text-xs text-blue-400 font-bold mt-2 mb-1">↪ ${escapeHtml(d.replyToName || "ポスト")} へのリプライ</div>` : ""}
            <p class="text-[15px] mt-2 whitespace-pre-wrap leading-relaxed break-words">${safeText}</p>
            ${quotedPost}
            <div class="flex justify-between items-center mt-3 max-w-sm text-[var(--sub)] pr-4">
              <button onclick="event.stopPropagation(); openReply('${id}', decodeURIComponent('${quoteName}'))" class="btn-ghost" aria-label="リプライ"><span class="material-icons-round text-lg">reply</span><span class="text-xs font-bold">${d.replyCount || 0}</span></button>
              <button onclick="event.stopPropagation(); setQuote(decodeURIComponent('${quoteText}'), decodeURIComponent('${quoteName}'))" class="btn-ghost" aria-label="引用"><span class="material-icons-round text-lg">cached</span></button>
              <button onclick="event.stopPropagation(); like('${id}', '${escapeAttr(d.uid || "")}')" class="btn-ghost ${liked ? 'text-[#f91880]' : ''}" aria-label="いいね"><span class="material-icons-round text-lg">${liked ? 'favorite' : 'favorite_border'}</span><span class="text-xs font-bold">${Array.isArray(d.likes) ? d.likes.length : 0}</span></button>
            </div>
          </div>
        </article>
      `;
    }

    window.openThread = async postId => {
      const modal = $("thread-modal");
      const container = $("thread-posts");
      container.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">読み込み中...</div>';
      modal.classList.remove("hidden");

      try {
        const parentSnap = await getDoc(doc(db, "logs", postId));
        if (!parentSnap.exists()) {
          container.innerHTML = '<div class="p-6 text-center">投稿が存在しません</div>';
          return;
        }

        let html = buildPostHTML(parentSnap.id, parentSnap.data(), false, true);
        const replySnap = await getDocs(query(collection(db, "logs"), where("replyTo", "==", postId), limit(80)));
        const replies = [];

        replySnap.forEach(x => replies.push({ id: x.id, data: x.data() }));
        replies.sort((a, b) => (toDate(a.data.createdAt)?.getTime() || 0) - (toDate(b.data.createdAt)?.getTime() || 0));

        if (replies.length) html += '<div class="px-4 py-2 text-xs text-[var(--sub)] font-bold">リプライ</div>';
        replies.forEach(r => {
          html += `<div class="ml-6 border-l-2 border-[var(--border)] pl-3">${buildPostHTML(r.id, r.data, false, true)}</div>`;
        });

        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<div class="p-6 text-center text-red-500">読み込み失敗: ${escapeHtml(e.message)}</div>`;
      }
    };

    window.openReply = (id, name) => {
      if (!requireAuth()) return;
      currentReplyPost = id;
      currentReplyAuthor = name || "ポスト";
      $("reply-target").innerText = `${currentReplyAuthor} に返信`;
      $("reply-modal").classList.remove("hidden");
      setTimeout(() => $("reply-input").focus(), 80);
    };

    window.closeReplyModal = () => {
      currentReplyPost = null;
      currentReplyAuthor = "";
      $("reply-input").value = "";
      $("reply-modal").classList.add("hidden");
    };

    window.sendReply = async () => {
      if (!requireAuth() || !currentReplyPost) return;
      const text = $("reply-input").value.trim();
      if (!text) return;

      const parentRef = doc(db, "logs", currentReplyPost);
      const parentSnap = await getDoc(parentRef);
      const parent = parentSnap.exists() ? parentSnap.data() : null;
      const exp = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000);

      await addDoc(collection(db, "logs"), {
        text,
        uid: currentUser.uid,
        authorName: myProfile.name || "名無し",
        authorIcon: myProfile.icon || LOGO_ICON,
        authorTitle: myProfile.title || "",
        createdAt: serverTimestamp(),
        expireAt: exp,
        likes: [],
        replyCount: 0,
        replyTo: currentReplyPost,
        replyToName: parent ? parent.authorName || "" : currentReplyAuthor,
        isReply: true
      });

      if (parentSnap.exists()) await updateDoc(parentRef, { replyCount: increment(1) });
      await progressMission("reply");

      if (parent?.uid && parent.uid !== currentUser.uid) {
        await addDoc(collection(db, "notif"), {
          to: parent.uid,
          from: myProfile.name || "名無し",
          fromUid: currentUser.uid,
          type: "reply",
          read: false,
          createdAt: serverTimestamp(),
          expireAt: exp
        });
      }

      const opened = currentReplyPost;
      closeReplyModal();
      openThread(opened);
    };

    window.setQuote = (text, name) => {
      if (!requireAuth()) return;
      quoteData = { text, name };
      $("quote-preview").classList.remove("hidden");
      $("quote-target-name").innerText = name;
      $("quote-target-text").innerText = text;
      switchTab("home");
      $("post-text").focus();
    };

    window.cancelQuote = () => {
      quoteData = null;
      $("quote-preview").classList.add("hidden");
    };

    window.like = async (id, to) => {
      if (!requireAuth()) return;
      const ref = doc(db, "logs", id);
      const snap = await getDoc(ref);
      if (!snap.exists()) return;

      const data = snap.data();
      const liked = Array.isArray(data.likes) && data.likes.includes(currentUser.uid);

      if (liked) {
        await updateDoc(ref, { likes: arrayRemove(currentUser.uid) });
      } else {
        await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
        await progressMission("like");

        if (to && to !== currentUser.uid) {
          await addDoc(collection(db, "notif"), {
            to,
            from: myProfile.name || "名無し",
            fromUid: currentUser.uid,
            type: "like",
            read: false,
            createdAt: serverTimestamp(),
            expireAt: new Date(Date.now() + 90 * 24 * 60 * 60 * 1000)
          });
        }
      }

      showToast(liked ? "いいねを外しました" : "いいねしました");
    };

    window.del = async id => {
      if (!requireAuth()) return;
      if (!confirm("このポストを削除する？")) return;

      const snap = await getDoc(doc(db, "logs", id));
      if (!snap.exists()) return;
      const data = snap.data();

      if (data.uid !== currentUser.uid && !isAdmin()) return showToast("削除権限なし");

      await deleteDoc(doc(db, "logs", id));
      loadTimeline();
    };

    async function loadRanking() {
      const list = $("explore-list");
      list.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">読み込み中...</div>';

      try {
        const snap = await getDocs(query(collection(db, "users"), orderBy("xp", "desc"), limit(30)));
        let html = "";
        let i = 1;

        snap.forEach(d => {
          html += userRow(d.id, normalizeProfile(d.data()), i++);
        });

        list.innerHTML = html || '<div class="p-6 text-center">ユーザーなし</div>';
      } catch (e) {
        const message = e.code === "permission-denied"
          ? "ログインするとユーザー一覧を表示できます。"
          : "読み込み失敗";
        list.innerHTML = `<div class="p-6 text-center text-sm text-[var(--sub)]">${message}</div>`;
      }
    }

    function userRow(uid, user, rankLabel) {
      return `
        <button class="w-full p-4 flex items-center gap-3 text-left hover:bg-[var(--border)]/20" onclick="viewUser('${uid}')">
          <span class="w-8 text-center font-black text-[var(--sub)]">${rankLabel}</span>
          <img src="${escapeAttr(user.icon || LOGO_ICON)}" class="w-10 h-10 rounded-full">
          <div class="flex-1 min-w-0">
            <div class="font-bold text-sm truncate">${escapeHtml(user.name || "名無し")}</div>
            <div class="text-xs text-[var(--sub)]">${user.xp || 0} XP</div>
          </div>
        </button>
      `;
    }

    window.searchUsers = () => {
      const value = $("search-input").value.toLowerCase();
      document.querySelectorAll("#explore-list > button").forEach(el => {
        el.style.display = el.innerText.toLowerCase().includes(value) ? "flex" : "none";
      });
    };

    window.viewUser = async uid => {
      if (!requireAuth() || !uid) return;
      if (uid === currentUser.uid) return switchTab("profile");

      const snap = await getDoc(doc(db, "users", uid));
      if (!snap.exists()) return showToast("ユーザーが見つかりません");

      const user = normalizeProfile(snap.data());
      $("other-name").innerText = user.name || "名無し";
      $("other-icon").src = user.icon || LOGO_ICON;
      $("other-uid").innerText = "@" + uid.slice(0, 8);
      $("other-xp").innerText = user.xp || 0;
      $("other-rank").innerText = rank(user.xp || 0);

      if (user.title) {
        $("other-title").innerText = user.title;
        $("other-title").classList.remove("hidden");
      } else {
        $("other-title").classList.add("hidden");
      }

      const following = (myProfile.following || []).includes(uid);
      $("other-follow-btn").innerText = following ? "フォロー中" : "フォローする";
      $("other-follow-btn").onclick = () => toggleFollow(uid);
      $("other-dm-btn").onclick = () => openChat(uid, user.name || "User");

      switchTab("other-profile");
      await loadOtherPosts(uid);
    };

    async function loadOtherPosts(uid) {
      const box = $("other-timeline");
      box.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">読み込み中...</div>';

      const snap = await getDocs(query(collection(db, "logs"), where("uid", "==", uid), limit(40)));
      const docs = [];
      snap.forEach(d => {
        const data = d.data();
        if (!data.isReply && !data.replyTo) docs.push({ id: d.id, data });
      });

      docs.sort((a, b) => (toDate(b.data.createdAt)?.getTime() || 0) - (toDate(a.data.createdAt)?.getTime() || 0));
      box.innerHTML = docs.map(d => buildPostHTML(d.id, d.data)).join("") || '<div class="p-6 text-center text-sm text-[var(--sub)]">ポストなし</div>';
    }

    window.toggleFollow = async uid => {
      if (!requireAuth()) return;
      const following = myProfile.following || [];
      const ref = doc(db, "users", currentUser.uid);

      if (following.includes(uid)) {
        await updateDoc(ref, { following: arrayRemove(uid) });
        myProfile.following = following.filter(x => x !== uid);
        showToast("フォロー解除しました");
      } else {
        await updateDoc(ref, { following: arrayUnion(uid) });
        myProfile.following = [...following, uid];
        await progressMission("follow");
        showToast("フォローしました");
      }

      viewUser(uid);
    };

    async function loadNotifications(markRead = false) {
      if (!currentUser) return;
      const list = $("notif-list");

      try {
        const snap = await getDocs(query(collection(db, "notif"), where("to", "==", currentUser.uid), limit(40)));
        const docs = [];
        snap.forEach(d => docs.push({ id: d.id, data: d.data() }));
        docs.sort((a, b) => (toDate(b.data.createdAt)?.getTime() || 0) - (toDate(a.data.createdAt)?.getTime() || 0));

        let unread = false;
        list.innerHTML = docs.map(n => {
          if (!n.data.read) unread = true;
          const icon = n.data.type === "like" ? "favorite" : n.data.type === "dm" ? "mail" : n.data.type === "post" ? "campaign" : n.data.type === "invite" ? "group_add" : "reply";
          const verb = n.data.type === "post" ? "新しく投稿しました" : n.data.type === "dm" ? "DMを送信しました" : n.data.type === "like" ? "いいねしました" : n.data.type === "invite" ? "招待から参加しました" : "リプライしました";
          const body = n.data.type === "post" && n.data.text ? `<div class="text-xs text-[var(--sub)] mt-1 truncate">「${escapeHtml(n.data.text)}」</div>` : "";

          return `
            <div class="p-4 flex gap-3 ${!n.data.read ? 'bg-[var(--accent)]/10' : ''}">
              <span class="material-icons-round text-[var(--accent)]">${icon}</span>
              <div class="text-sm min-w-0">
                <span class="font-bold">${escapeHtml(n.data.from || "誰か")}</span>さんが${verb}
                ${body}
                <div class="text-xs text-[var(--sub)] mt-1">${formatTime(n.data.createdAt)}</div>
              </div>
            </div>
          `;
        }).join("") || '<div class="p-8 text-center text-sm text-[var(--sub)]">通知なし</div>';

        $("nav-badge").style.display = unread ? "block" : "none";

        if (markRead) {
          await Promise.all(docs.filter(n => !n.data.read).map(n => updateDoc(doc(db, "notif", n.id), { read: true })));
          $("nav-badge").style.display = "none";
        }
      } catch (e) {
        list.innerHTML = '<div class="p-6 text-center text-sm text-red-500">通知読み込み失敗</div>';
      }
    }

    window.loadNotifications = loadNotifications;

    window.startDMListWatcher = (force = false) => {
      if (!requireAuth()) return;
      if (dmRoomsUnsub && !force) return;

      dmRoomsUnsub?.();
      const box = $("dm-list");
      box.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">DM接続中...</div>';

      dmRoomsUnsub = onSnapshot(query(collection(db, "dmRooms"), where("members", "array-contains", currentUser.uid), limit(40)), snap => {
        const rooms = [];
        snap.forEach(d => rooms.push({ id: d.id, data: d.data() }));
        renderDMRooms(rooms);
      }, () => {
        box.innerHTML = '<div class="p-6 text-center text-sm text-red-500">DM接続失敗<br><button onclick="startDMListWatcher(true)" class="btn-soft mt-3">再接続</button></div>';
      });
    };

    function renderDMRooms(rooms) {
      const box = $("dm-list");
      rooms.sort((a, b) => (toDate(b.data.updatedAt)?.getTime() || 0) - (toDate(a.data.updatedAt)?.getTime() || 0));

      let html = "";
      for (const room of rooms) {
        const other = (room.data.members || []).find(x => x !== currentUser.uid);
        if (!other) continue;
        const name = room.data.names?.[other] || "User";
        const encodedName = encodeForHandler(name);

        html += `
          <button onclick="openChat('${other}', decodeURIComponent('${encodedName}'))" class="w-full text-left p-4 border border-[var(--border)] rounded-2xl hover:bg-[var(--border)]/20">
            <div class="flex justify-between gap-2">
              <div class="font-bold truncate">${escapeHtml(name)}</div>
              <div class="text-[10px] text-[var(--sub)] flex-shrink-0">${formatTime(room.data.updatedAt)}</div>
            </div>
            <div class="text-xs text-[var(--sub)] truncate mt-1">${escapeHtml(room.data.lastMessage || "")}</div>
          </button>
        `;
      }

      box.innerHTML = html || '<div class="p-8 text-center text-sm text-[var(--sub)]">DMなし</div>';
    }

    window.openChat = async (uid, name = "") => {
      if (!requireAuth()) return;
      currentChatUser = uid;
      currentChatName = name || "User";
      $("chat-target-name").innerText = currentChatName;
      switchTab("chat");
      startChatWatcher(uid);
    };

    function startChatWatcher(uid) {
      if (!currentUser || !uid) return;
      chatUnsub?.();

      const box = $("chat-messages");
      const room = roomIdFor(currentUser.uid, uid);
      box.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">DM接続中...</div>';

      chatUnsub = onSnapshot(query(collection(db, "chats", room, "messages"), orderBy("createdAt", "asc"), limit(80)), snap => {
        let html = "";

        snap.forEach(d => {
          const msg = d.data();
          const mine = msg.senderId === currentUser.uid;
          html += `
            <div class="flex ${mine ? 'justify-end' : 'justify-start'}">
              <div class="dm-bubble px-4 py-2 rounded-2xl text-[15px] ${mine ? 'bg-blue-500 text-white rounded-br-sm' : 'bg-gray-100 text-black rounded-bl-sm'}">
                <div>${escapeHtml(msg.text || "")}</div>
                <div class="text-[10px] opacity-70 mt-1 text-right">${formatTime(msg.createdAt)}</div>
              </div>
            </div>
          `;
        });

        box.innerHTML = html || '<div class="p-8 text-center text-sm text-[var(--sub)]">まだメッセージなし</div>';
        requestAnimationFrame(() => box.scrollTop = box.scrollHeight);
      }, () => {
        box.innerHTML = '<div class="p-6 text-center text-sm text-red-500">DM接続失敗<br><button onclick="startChatWatcher(currentChatUser)" class="btn-soft mt-3">再接続</button></div>';
      });
    }

    window.startChatWatcher = startChatWatcher;

    $("chat-send-btn").onclick = async () => {
      if (!requireAuth() || !currentChatUser) return;
      const input = $("chat-input");
      const text = input.value.trim();
      if (!text) return;

      const room = roomIdFor(currentUser.uid, currentChatUser);
      const exp = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000);
      const targetName = currentChatName || "User";

      await addDoc(collection(db, "chats", room, "messages"), {
        text,
        senderId: currentUser.uid,
        createdAt: serverTimestamp(),
        expireAt: exp
      });

      await setDoc(doc(db, "dmRooms", room), {
        members: [currentUser.uid, currentChatUser],
        names: {
          [currentUser.uid]: myProfile.name || "自分",
          [currentChatUser]: targetName
        },
        lastMessage: text,
        updatedAt: serverTimestamp(),
        expireAt: exp
      }, { merge: true });

      await addDoc(collection(db, "notif"), {
        to: currentChatUser,
        from: myProfile.name || "名無し",
        fromUid: currentUser.uid,
        type: "dm",
        read: false,
        createdAt: serverTimestamp(),
        expireAt: exp
      });

      input.value = "";
      await progressMission("dm");
    };

    $("chat-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        $("chat-send-btn").click();
      }
    });

    async function recordReferral(referrerUid, invitedName) {
      if (!validReferralUid(referrerUid) || referrerUid === currentUser?.uid) return;

      try {
        const recorded = await progressMissionForUser(referrerUid, "inviteAccepted");
        if (!recorded) return;
        await addDoc(collection(db, "notif"), {
          to: referrerUid,
          from: invitedName || "新しいユーザー",
          fromUid: currentUser.uid,
          type: "invite",
          read: false,
          createdAt: serverTimestamp(),
          expireAt: new Date(Date.now() + 90 * 24 * 60 * 60 * 1000)
        });
      } catch (e) {
        console.warn(e);
      }
    }

    window.saveProfile = async () => {
      if (!currentUser) return;
      const name = $("edit-name-input").value.trim();
      if (!name) return showToast("表示名を入力して");

      const icon = LOGO_ICON;
      const referredBy = pendingReferralUid && pendingReferralUid !== currentUser.uid ? pendingReferralUid : "";
      const profile = {
        name,
        icon,
        xp: referredBy ? 180 : 100,
        following: [],
        title: "見習い",
        adminMode: false,
        referralCount: 0,
        referredBy,
        activeMissions: STARTER_MISSIONS.map((m, i) => ({ ...m, id: `starter_${m.type}_${i}`, progress: 0 })),
        expireAt: new Date(Date.now() + 90 * 24 * 60 * 60 * 1000)
      };

      await setDoc(doc(db, "users", currentUser.uid), profile, { merge: true });
      if (referredBy) {
        await recordReferral(referredBy, name);
        localStorage.removeItem("pendingReferralUid");
        pendingReferralUid = "";
      }
      myProfile = normalizeProfile(profile);
      $("profile-modal").classList.add("hidden");
      initLoggedIn();
      showToast(referredBy ? "招待参加ボーナス +80XP" : "プロフィールを作成しました");
    };

    window.copyInviteLink = async () => {
      if (!requireAuth()) return;
      const link = inviteUrlFor();
      try {
        await navigator.clipboard.writeText(link);
        await progressMission("inviteShare");
        showToast("招待リンクをコピーしました");
      } catch (e) {
        $("invite-link").focus();
        $("invite-link").select();
        showToast("リンクを選択しました");
      }
    };

    window.shareInviteLink = async () => {
      if (!requireAuth()) return;
      const link = inviteUrlFor();
      const text = "LoG SNSでつながろう";

      if (navigator.share) {
        try {
          await navigator.share({ title: "LoG SNS", text, url: link });
          await progressMission("inviteShare");
          return;
        } catch (e) {
          if (e.name === "AbortError") return;
        }
      }

      await window.copyInviteLink();
    };

    window.rerollIcon = async () => {
      if (!requireAuth()) return;
      const icon = `https://api.dicebear.com/7.x/notionists/svg?seed=${currentUser.uid}_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      await updateDoc(doc(db, "users", currentUser.uid), { icon });
      myProfile.icon = icon;
      updateMyProfileUI();
    };

    window.setAdmin = async () => {
      if (!requireAuth()) return;
      showToast("管理者権限はサーバー側で付与してください");
    };

    window.switchProfileSubTab = tab => {
      currentProfileTab = tab;
      $("tab-btn-posts").className = tab === "posts"
        ? 'flex-1 text-center py-3 font-bold border-b-2 border-[var(--text)]'
        : 'flex-1 text-center py-3 font-bold text-[var(--sub)]';
      $("tab-btn-likes").className = tab === "likes"
        ? 'flex-1 text-center py-3 font-bold border-b-2 border-[var(--text)]'
        : 'flex-1 text-center py-3 font-bold text-[var(--sub)]';
      tab === "posts" ? loadMyPosts() : loadMyLikes();
    };

    async function loadMyPosts() {
      if (!currentUser) return;
      const box = $("my-timeline");
      box.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">読み込み中...</div>';

      const snap = await getDocs(query(collection(db, "logs"), where("uid", "==", currentUser.uid), limit(60)));
      const docs = [];
      snap.forEach(d => {
        const data = d.data();
        if (!data.isReply && !data.replyTo) docs.push({ id: d.id, data });
      });

      docs.sort((a, b) => (toDate(b.data.createdAt)?.getTime() || 0) - (toDate(a.data.createdAt)?.getTime() || 0));
      box.innerHTML = docs.slice(0, 20).map(d => buildPostHTML(d.id, d.data)).join("") || '<div class="p-6 text-center text-sm text-[var(--sub)]">ポストなし</div>';
    }

    async function loadMyLikes() {
      if (!currentUser) return;
      const box = $("my-timeline");
      box.innerHTML = '<div class="p-6 text-center text-sm text-[var(--sub)]">読み込み中...</div>';

      const snap = await getDocs(query(collection(db, "logs"), where("likes", "array-contains", currentUser.uid), limit(30)));
      const docs = [];
      snap.forEach(d => docs.push({ id: d.id, data: d.data() }));
      docs.sort((a, b) => (toDate(b.data.createdAt)?.getTime() || 0) - (toDate(a.data.createdAt)?.getTime() || 0));
      box.innerHTML = docs.map(d => buildPostHTML(d.id, d.data)).join("") || '<div class="p-6 text-center text-sm text-[var(--sub)]">いいねなし</div>';
    }

    window.openSettings = () => $("settings-modal").classList.remove("hidden");

    window.toggleDarkMode = () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    };

    window.signOutApp = () => {
      signOut(auth);
      $("settings-modal").classList.add("hidden");
    };

    window.switchTab = tab => {
      if (["dm", "notif", "profile", "chat"].includes(tab) && !requireAuth()) return;

      ["home", "explore", "dm", "notif", "profile", "other-profile", "chat"].forEach(name => {
        const el = $(`tab-${name}`);
        if (el) el.classList.add("hidden");
      });

      const target = $(`tab-${tab}`);
      if (target) target.classList.remove("hidden");

      document.querySelectorAll(".nav-item").forEach(btn => btn.classList.remove("nav-active"));
      const nav = document.querySelector(`.nav-item[data-target="${tab}"]`);
      if (nav) nav.classList.add("nav-active");

      if (tab === "explore") loadRanking();
      if (tab === "dm") startDMListWatcher();
      if (tab === "notif") loadNotifications(true);

      if (tab === "profile") {
        updateMyProfileUI();
        currentProfileTab === "posts" ? loadMyPosts() : loadMyLikes();
      }

      if (tab !== "chat") {
        chatUnsub?.();
        chatUnsub = null;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    };

    document.addEventListener("keydown", e => {
      if (e.key !== "Escape") return;
      ["auth-modal", "reply-modal", "thread-modal", "settings-modal"].forEach(id => $(id)?.classList.add("hidden"));
    });
  </script>

</body>
</html>
