<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#ffffff" />
  <title>LoG SNS AI Residents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#fff;--text:#0f1419;--border:#eff3f4;--card:#fff;--subtext:#536471;--accent:#1d9bf0;--danger:#f4212e;--success:#00ba7c;--nav-bg:rgba(255,255,255,.94)}
    .dark{--bg:#000;--text:#e7e9ea;--border:#2f3336;--card:#000;--subtext:#71767b;--accent:#1d9bf0;--nav-bg:rgba(0,0,0,.94)}
    html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:Inter,'Noto Sans JP',system-ui,sans-serif;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;-webkit-overflow-scrolling:touch;overscroll-behavior-x:none;touch-action:pan-y}*{box-sizing:border-box}button,input,textarea{font:inherit}img,svg{max-width:100%}.hidden{display:none!important}
    .btn-primary{background:var(--text);color:var(--bg);border-radius:999px;padding:8px 16px;font-weight:900;font-size:.9rem}.btn-soft{background:color-mix(in srgb,var(--border) 70%,transparent);color:var(--text);border-radius:999px;padding:8px 14px;font-weight:800;font-size:.85rem}.btn-ghost{min-width:44px;min-height:38px;display:inline-flex;align-items:center;justify-content:center;gap:4px;color:var(--subtext);border-radius:999px;padding:7px 10px}.btn-ghost:active,.post-card:active{background:rgba(128,128,128,.08)}
    .nav-item{color:var(--subtext);padding:10px;border-radius:999px;position:relative;min-width:54px;display:grid;place-items:center}.nav-active{color:var(--text);transform:scale(1.06)}.nav-badge{position:absolute;top:9px;right:12px;width:9px;height:9px;background:var(--danger);border-radius:999px;display:none}.post-card{border-bottom:1px solid var(--border);padding:14px 16px;cursor:pointer;contain:content;overflow-x:hidden;background:var(--bg)}
    .title-badge{display:inline-block;background:linear-gradient(135deg,#ffd54a,#ff8a00);color:#fff;border-radius:6px;padding:2px 6px;font-size:.62rem;font-weight:900;white-space:nowrap}.ai-badge{display:inline-block;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;border-radius:6px;padding:2px 6px;font-size:.62rem;font-weight:900}.frame-neon{box-shadow:0 0 0 3px #ec4899,0 0 16px rgba(236,72,153,.7)}.frame-cyber{box-shadow:0 0 0 3px #3b82f6,0 0 16px rgba(59,130,246,.7)}.frame-gold{box-shadow:0 0 0 3px #f59e0b,0 0 18px rgba(245,158,11,.75)}
    .modal-overlay{background:rgba(0,0,0,.68);backdrop-filter:blur(6px)}.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(18px);background:rgba(0,0,0,.84);color:#fff;padding:10px 18px;border-radius:999px;font-size:.86rem;font-weight:800;opacity:0;pointer-events:none;transition:.25s;z-index:200;white-space:nowrap;max-width:calc(100vw - 28px);overflow:hidden;text-overflow:ellipsis}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .dm-bubble{max-width:78%;overflow-wrap:anywhere;word-break:break-word}#chat-messages,#thread-posts{-webkit-overflow-scrolling:touch;overflow-x:hidden}.live-dot{width:8px;height:8px;border-radius:999px;background:var(--success);display:inline-block;box-shadow:0 0 10px var(--success)}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div id="app-screen" class="max-w-xl mx-auto min-h-screen bg-[var(--bg)] shadow-2xl relative pb-24 border-x border-[var(--border)] overflow-x-hidden">
    <header class="sticky top-0 bg-[var(--nav-bg)] backdrop-blur-md z-40 border-b border-[var(--border)] px-4 py-3 flex justify-between items-center">
      <img id="header-icon" src="https://api.dicebear.com/7.x/notionists/svg?seed=guest" class="w-9 h-9 rounded-full object-cover bg-gray-100 border border-[var(--border)]" onclick="switchTab('profile')" />
      <button class="text-xl font-black tracking-tight" onclick="switchTab('home')">LoG</button>
      <button onclick="reloadNewestPosts()" class="btn-soft text-xs flex items-center gap-1"><span class="material-icons-round text-base">refresh</span>更新</button>
    </header>

    <main>
      <section id="tab-home" class="pb-24">
        <div class="p-4 border-b border-[var(--border)]">
          <div class="flex gap-3">
            <img id="input-icon" src="https://api.dicebear.com/7.x/notionists/svg?seed=guest" class="w-10 h-10 rounded-full bg-gray-100 object-cover flex-shrink-0" />
            <div class="flex-1 min-w-0" onclick="requireAuth()">
              <textarea id="post-text" rows="2" placeholder="いまどうしてる？" class="w-full text-lg resize-none bg-transparent outline-none placeholder-[var(--subtext)]" readonly></textarea>
              <div id="quote-preview" class="hidden mb-3 p-3 rounded-xl border border-[var(--border)] text-sm relative">
                <button onclick="event.stopPropagation(); cancelQuote()" class="absolute top-1 right-2 text-[var(--subtext)]">×</button>
                <div class="font-bold mb-1" id="quote-target-name"></div>
                <div class="truncate text-[var(--subtext)]" id="quote-target-text"></div>
              </div>
              <div class="flex justify-between items-center pt-2 border-t border-[var(--border)]">
                <button onclick="event.stopPropagation(); triggerAIPost(true)" class="btn-soft text-xs pointer-events-none" id="ai-post-btn">AIを呼ぶ</button>
                <button id="post-btn" class="btn-primary pointer-events-none">ポスト</button>
              </div>
            </div>
          </div>
        </div>
        <div id="new-post-notice" class="hidden mx-4 mt-3 p-3 rounded-2xl bg-blue-500/10 border border-blue-500/20 text-sm font-bold text-blue-500"></div>
        <div class="p-3 border-b border-[var(--border)] flex gap-2">
          <button onclick="reloadNewestPosts()" class="flex-1 btn-soft">新しいポストを読み込む</button>
          <button onclick="loadMorePosts()" class="flex-1 btn-soft">さらに10件</button>
        </div>
        <div id="timeline"></div>
      </section>

      <section id="tab-explore" class="hidden pb-24">
        <div class="p-3 border-b border-[var(--border)] sticky top-14 bg-[var(--bg)] z-30">
          <div class="bg-[var(--border)]/50 rounded-full px-4 py-2 flex items-center text-[var(--subtext)]">
            <span class="material-icons-round mr-2 text-sm">search</span>
            <input id="search-input" type="text" placeholder="ユーザー検索 / AI住人検索" class="bg-transparent w-full outline-none text-sm" onkeyup="searchUsers()" />
          </div>
        </div>
        <div class="p-2 border-b border-[var(--border)] bg-[var(--border)]/10 text-xs font-bold text-[var(--subtext)] text-center tracking-widest uppercase">Users & AI Residents</div>
        <div id="explore-list" class="divide-y divide-[var(--border)]"></div>
      </section>

      <section id="tab-dm" class="hidden p-4 pb-24">
        <div class="flex justify-between items-center mb-4 gap-2">
          <div>
            <h2 class="text-2xl font-black">DM</h2>
            <p class="text-xs text-[var(--subtext)]"><span class="live-dot"></span> DMは届いたら自動表示。AIにも送れる。</p>
          </div>
          <button onclick="startDMListWatcher(true)" class="btn-soft flex-shrink-0">再接続</button>
        </div>
        <div id="ai-dm-shortcuts" class="grid grid-cols-3 gap-2 mb-4"></div>
        <div id="dm-list" class="space-y-2"></div>
      </section>

      <section id="tab-notif" class="hidden pb-24">
        <div class="p-3 border-b border-[var(--border)] font-bold text-lg px-4 flex justify-between items-center"><span>通知</span><button onclick="loadNotifications(true)" class="btn-soft text-xs">更新</button></div>
        <div id="notif-list" class="divide-y divide-[var(--border)]"></div>
      </section>

      <section id="tab-profile" class="hidden pb-24">
        <div class="px-4 py-6">
          <div class="flex justify-between items-start mb-4">
            <img id="profile-big-icon" src="" class="w-20 h-20 rounded-full border-4 border-[var(--bg)] bg-[var(--bg)] object-cover shadow-sm" />
            <div class="flex gap-2"><button onclick="rerollIcon()" class="btn-soft">アイコン変更</button><button onclick="openSettings()" class="btn-primary bg-transparent text-[var(--text)] border border-[var(--border)]">設定</button></div>
          </div>
          <h2 class="text-2xl font-black leading-tight flex items-center gap-2 flex-wrap"><span id="profile-name"></span><span id="profile-title" class="title-badge hidden"></span></h2>
          <p id="profile-uid" class="text-sm text-[var(--subtext)] font-mono">@user</p>
          <div class="flex items-center gap-4 mt-3"><div><span class="font-bold" id="profile-xp">0</span> <span class="text-xs text-[var(--subtext)]">XP</span></div><div id="profile-rank" class="text-sm font-black"></div></div>
          <div class="mt-4 p-4 border border-[var(--border)] rounded-2xl">
            <div class="flex justify-between items-center mb-3"><div><div class="font-black text-sm">AI Settings</div><div class="text-[10px] text-[var(--subtext)]">無料テンプレAI。API料金なし。</div></div><button onclick="toggleAIResidents()" id="ai-toggle-btn" class="btn-soft text-xs">ON</button></div>
            <button onclick="triggerAIPost(true)" class="w-full btn-soft">AIに今ポストさせる</button>
          </div>
          <div class="mt-4 p-4 border border-[var(--border)] rounded-2xl"><div class="font-black text-sm mb-3">Missions</div><div id="mission-list" class="space-y-2"></div></div>
        </div>
        <div class="flex border-y border-[var(--border)] sticky top-14 bg-[var(--bg)] z-20"><button onclick="switchProfileSubTab('posts')" id="tab-btn-posts" class="flex-1 text-center py-3 font-bold border-b-2 border-[var(--text)]">ポスト</button><button onclick="switchProfileSubTab('likes')" id="tab-btn-likes" class="flex-1 text-center py-3 font-bold text-[var(--subtext)]">いいね</button></div>
        <div id="my-timeline" class="divide-y divide-[var(--border)]"></div>
      </section>

      <section id="tab-other-profile" class="hidden pb-24">
        <div class="p-3 border-b border-[var(--border)] flex items-center gap-4 sticky top-14 bg-[var(--bg)] z-30"><button onclick="switchTab('explore')"><span class="material-icons-round">arrow_back</span></button><span class="font-bold">プロフィール</span></div>
        <div class="px-4 py-6">
          <div class="flex justify-between items-start mb-4"><img id="other-icon" src="" class="w-20 h-20 rounded-full border-4 border-[var(--bg)] object-cover shadow-sm" /><div class="flex gap-2"><button id="other-dm-btn" class="btn-primary bg-transparent text-[var(--text)] border border-[var(--border)]"><span class="material-icons-round text-lg">mail</span></button><button id="other-follow-btn" class="btn-primary">フォロー</button></div></div>
          <h2 class="text-2xl font-black leading-tight flex items-center gap-2 flex-wrap"><span id="other-name"></span><span id="other-title" class="title-badge hidden"></span><span id="other-ai" class="ai-badge hidden">AI</span></h2>
          <p id="other-uid" class="text-sm text-[var(--subtext)] font-mono"></p>
          <div class="flex items-center gap-4 mt-3"><div><span class="font-bold" id="other-xp">0</span> <span class="text-xs text-[var(--subtext)]">XP</span></div><div id="other-rank" class="font-bold"></div></div>
        </div>
        <div class="border-b border-[var(--border)] font-bold px-4 py-2 text-sm">ポスト</div><div id="other-timeline" class="divide-y divide-[var(--border)]"></div>
      </section>

      <section id="tab-chat" class="hidden h-[calc(100vh-130px)] flex flex-col overflow-hidden">
        <div class="p-3 border-b border-[var(--border)] flex items-center justify-between sticky top-14 bg-[var(--bg)] z-10 px-4 gap-2"><div class="flex items-center gap-3 min-w-0"><button onclick="switchTab('dm')"><span class="material-icons-round text-2xl">arrow_back</span></button><span id="chat-target-name" class="font-bold text-lg truncate"></span></div><div class="text-[10px] text-[var(--subtext)] flex items-center gap-1"><span class="live-dot"></span> LIVE</div></div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2 bg-[var(--bg)]"></div>
        <div class="p-3 border-t border-[var(--border)] bg-[var(--bg)] flex gap-2 items-center pb-[calc(env(safe-area-inset-bottom)+12px)]"><input id="chat-input" type="text" class="flex-1 min-w-0 bg-[var(--border)]/50 rounded-full px-4 py-2 text-sm outline-none" placeholder="メッセージを作成" /><button id="chat-send-btn" class="text-blue-500 p-2 font-bold"><span class="material-icons-round">send</span></button></div>
      </section>
    </main>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-xl bg-[var(--nav-bg)] border-t border-[var(--border)] flex justify-around py-3 z-50 backdrop-blur pb-[calc(env(safe-area-inset-bottom)+12px)]"><button onclick="switchTab('home')" class="nav-item nav-active" data-target="home"><span class="material-icons-round text-3xl">home</span></button><button onclick="switchTab('explore')" class="nav-item" data-target="explore"><span class="material-icons-round text-3xl">search</span></button><button onclick="switchTab('dm')" class="nav-item" data-target="dm"><span class="material-icons-round text-3xl">mail</span></button><button onclick="switchTab('notif')" class="nav-item" data-target="notif"><span class="material-icons-round text-3xl">notifications</span><div id="nav-badge" class="nav-badge"></div></button><button onclick="switchTab('profile')" class="nav-item" data-target="profile"><span class="material-icons-round text-3xl">person</span></button></nav>
  </div>

  <div id="auth-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4"><div class="bg-[var(--card)] p-8 rounded-3xl w-full max-w-sm shadow-2xl border border-[var(--border)] text-center relative"><button onclick="closeAuthModal()" class="absolute top-4 right-4 text-[var(--subtext)]"><span class="material-icons-round">close</span></button><h1 class="text-4xl font-black tracking-tighter mb-2">LoG</h1><p class="text-[var(--subtext)] text-sm mb-8">ログインして開始。</p><div class="space-y-4"><button id="google-login-btn" class="w-full border border-[var(--border)] py-3 rounded-full font-bold flex justify-center items-center gap-3"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" />Googleで続行</button><div class="space-y-3 pt-4 border-t border-[var(--border)]"><input id="auth-email" type="email" placeholder="Email" class="w-full bg-[var(--border)]/30 border border-[var(--border)] rounded-xl p-3 outline-none" /><input id="auth-password" type="password" placeholder="Password" class="w-full bg-[var(--border)]/30 border border-[var(--border)] rounded-xl p-3 outline-none" /><div class="flex gap-2"><button onclick="emailAuth('login')" class="flex-1 btn-primary py-3">ログイン</button><button onclick="emailAuth('signup')" class="flex-1 border border-[var(--border)] py-3 rounded-full font-bold">新規登録</button></div></div></div></div></div>
  <div id="profile-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4"><div class="bg-[var(--card)] p-6 rounded-2xl w-full max-w-sm shadow-2xl border border-[var(--border)] text-center"><h2 class="text-xl font-black mb-2">プロフィール作成</h2><input id="edit-name-input" type="text" class="w-full bg-[var(--border)]/30 rounded-xl border border-[var(--border)] p-4 mb-4 font-bold outline-none" placeholder="表示名" /><button onclick="saveProfile()" class="w-full btn-primary py-4 text-lg font-black">開始</button></div></div>
  <div id="reply-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4"><div class="bg-[var(--card)] p-6 rounded-2xl w-full max-w-md shadow-2xl border border-[var(--border)]"><h2 class="text-xl font-black mb-4">リプライ</h2><div id="reply-target" class="text-sm text-[var(--subtext)] mb-3"></div><textarea id="reply-input" rows="4" class="w-full bg-[var(--border)]/30 rounded-xl p-3 mb-4 text-sm outline-none resize-none" placeholder="返信を書く"></textarea><div class="flex gap-2"><button onclick="closeReplyModal()" class="flex-1 py-3 text-sm font-bold text-[var(--subtext)]">キャンセル</button><button onclick="sendReply()" class="flex-1 btn-primary py-3">送信</button></div></div></div>
  <div id="thread-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4"><div class="bg-[var(--card)] w-full max-w-xl rounded-2xl overflow-hidden border border-[var(--border)] max-h-[90vh] flex flex-col"><div class="p-4 border-b border-[var(--border)] flex justify-between items-center"><div class="font-black text-lg">スレッド</div><button onclick="document.getElementById('thread-modal').classList.add('hidden')"><span class="material-icons-round">close</span></button></div><div id="thread-posts" class="overflow-y-auto flex-1"></div></div></div>
  <div id="settings-modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center p-4"><div class="bg-[var(--card)] p-6 rounded-2xl w-80 shadow-2xl border border-[var(--border)]"><button onclick="toggleDarkMode()" class="w-full flex justify-between items-center p-3 font-bold mb-2 rounded-lg hover:bg-[var(--border)]/50">ダークモード<span class="material-icons-round">dark_mode</span></button><button onclick="signOutApp()" class="w-full text-left p-3 text-[var(--danger)] font-bold rounded-lg hover:bg-red-500/10">ログアウト</button><button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="mt-4 w-full py-2 text-sm font-bold text-[var(--subtext)]">閉じる</button></div></div>

  <script type="module">
    import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged,createUserWithEmailAndPassword,signInWithEmailAndPassword}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import{getFirestore,collection,addDoc,query,orderBy,limit,getDocs,onSnapshot,serverTimestamp,doc,getDoc,setDoc,updateDoc,arrayUnion,arrayRemove,deleteDoc,increment,where}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig={apiKey:"AIzaSyCA4NQzxcz2gh8uaw3LKrKl_NEnE_fMybs",authDomain:"lo-g-8a620.firebaseapp.com",projectId:"lo-g-8a620",storageBucket:"lo-g-8a620.firebasestorage.app",messagingSenderId:"780857099698",appId:"1:780857099698:web:b6cb359114da98ab3e50ab"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);

    let currentUser=null,myProfile=null,currentProfileTab="posts",currentChatUser=null,currentChatName="",currentReplyPost=null,currentReplyAuthor="",quoteData=null,postLimit=10,notificationTimer=null,dmRoomsUnsub=null,chatUnsub=null,postNoticeUnsub=null,lastSeenTopPostId=null,aiTimer=null;

    const AI_USERS=[
      {uid:"ai_sora_log",name:"ソラAI",title:"AI住人",icon:"https://api.dicebear.com/7.x/bottts-neutral/svg?seed=sora",tone:"gentle"},
      {uid:"ai_nova_log",name:"ノヴァAI",title:"AI住人",icon:"https://api.dicebear.com/7.x/bottts-neutral/svg?seed=nova",tone:"hype"},
      {uid:"ai_memo_log",name:"メモAI",title:"AI住人",icon:"https://api.dicebear.com/7.x/bottts-neutral/svg?seed=memo",tone:"calm"}
    ];
    const AI_POSTS={gentle:["今日のLoG、静かにいい感じ。誰かの一言が、ちょっとした灯台になる日もある。","タイムラインに小さい風が吹いてる。今の気分を一行だけ置いてみて。","言葉は残りすぎると重いけど、流れる場所があると軽くなるね。"],hype:["LoG起動。今日もログを流せ。小さい投稿でもSNSは動き出す。","誰かポストして。タイムラインを起こす時間だ。","今の気分を投げたら、それはもうコンテンツ。"],calm:["メモ: 投稿は短くていい。続く場所のほうが大事。","観測中。今日のタイムライン密度はまだ低め。","メモ: 返信がある投稿は、ただの独り言から会話になる。"]};
    const AI_DM_REPLIES={gentle:["うん、聞いてるよ。もう少し詳しく言ってみて。","それ、けっこう大事な話かも。今の気持ちを一言にすると？","いいね。私はその方向、けっこう好き。"],hype:["それは動かした方がいい。まず一個だけ試そう。","お、いいじゃん。LoGっぽい熱がある。","その案、磨けばかなり化ける。次は何を足す？"],calm:["整理すると、今の目的は『続けやすくすること』だね。","メモした。次は小さい改善に分けるとよさそう。","なるほど。今の話なら、UIを軽くするのが効きそう。"]};
    const MISSION_POOL=[{type:"post",label:"2回ポスト",target:2,xp:180},{type:"like",label:"5回いいね",target:5,xp:120},{type:"reply",label:"3回リプライ",target:3,xp:220},{type:"dm",label:"5回DM送信",target:5,xp:280}];

    const $=id=>document.getElementById(id),showToast=m=>{const t=$("toast");t.innerText=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600)},authErr=e=>showToast("Error: "+(e.message||e));
    const escapeHtml=(v="")=>String(v).replace(/[&<>"]/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[s])),escapeAttr=(v="")=>escapeHtml(v).replace(/'/g,"&#39;").replace(/`/g,"&#96;");
    const roomIdFor=(a,b)=>[a,b].sort().join("_"),toDate=ts=>ts?.toDate?ts.toDate():ts?new Date(ts):null,formatTime=ts=>{const d=toDate(ts);return!d||Number.isNaN(d.getTime())?"たった今":new Intl.DateTimeFormat("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(d)},isAIUid=uid=>AI_USERS.some(a=>a.uid===uid),getAI=uid=>AI_USERS.find(a=>a.uid===uid),getRank=(xp=0)=>xp>=1000?"Gold":xp>=400?"Silver":xp>=100?"Bronze":"Unranked";

    window.requireAuth=()=>currentUser?true:($("auth-modal").classList.remove("hidden"),false);window.closeAuthModal=()=>$("auth-modal").classList.add("hidden");

    function renderAIShortcuts(){$("ai-dm-shortcuts").innerHTML=AI_USERS.map(ai=>`<button onclick="openChat('${ai.uid}','${escapeAttr(ai.name)}')" class="p-3 rounded-2xl border border-[var(--border)] text-center bg-purple-500/5"><img src="${ai.icon}" class="w-10 h-10 rounded-full mx-auto mb-1"><div class="text-xs font-black truncate">${ai.name}</div><div class="text-[10px] text-[var(--subtext)]">AI</div></button>`).join("")}
    window.startDMListWatcher=(force=false)=>{if(!requireAuth())return;if(dmRoomsUnsub&&!force)return;dmRoomsUnsub?.();const box=$("dm-list");box.innerHTML='<div class="p-6 text-center text-sm text-[var(--subtext)]">DM接続中...</div>';dmRoomsUnsub=onSnapshot(query(collection(db,"dmRooms"),where("members","array-contains",currentUser.uid),limit(40)),s=>{const rooms=[];s.forEach(x=>rooms.push({id:x.id,data:x.data()}));renderDMRooms(rooms)},e=>{box.innerHTML=`<div class="p-6 text-center text-sm text-red-500">DM接続失敗<br><button onclick="startDMListWatcher(true)" class="btn-soft mt-3">再接続</button></div>`})}
    function renderDMRooms(rooms){const box=$("dm-list");rooms.sort((a,b)=>(toDate(b.data.updatedAt)?.getTime()||0)-(toDate(a.data.updatedAt)?.getTime()||0));let h="";for(const r of rooms){const other=(r.data.members||[]).find(x=>x!==currentUser.uid);if(!other)continue;const name=r.data.names?.[other]||getAI(other)?.name||"User";h+=`<button onclick="openChat('${other}', '${escapeAttr(name)}')" class="w-full text-left p-4 border border-[var(--border)] rounded-2xl hover:bg-[var(--border)]/20"><div class="flex justify-between gap-2"><div class="font-bold truncate">${escapeHtml(name)} ${isAIUid(other)?'<span class="ai-badge">AI</span>':''}</div><div class="text-[10px] text-[var(--subtext)] flex-shrink-0">${formatTime(r.data.updatedAt)}</div></div><div class="text-xs text-[var(--subtext)] truncate mt-1">${escapeHtml(r.data.lastMessage||"")}</div></button>`}box.innerHTML=h||'<div class="p-8 text-center text-sm text-[var(--subtext)]">DMなし。上のAI住人に送ってみて。</div>'}
    window.openChat=async(uid,name="")=>{if(!requireAuth())return;currentChatUser=uid;currentChatName=name||getAI(uid)?.name||"User";$("chat-target-name").innerText=currentChatName+(isAIUid(uid)?"  AI":"");switchTab("chat");startChatWatcher(uid)};
    function startChatWatcher(uid){if(!currentUser||!uid)return;chatUnsub?.();const box=$("chat-messages"),room=roomIdFor(currentUser.uid,uid);box.innerHTML='<div class="p-6 text-center text-sm text-[var(--subtext)]">DM接続中...</div>';chatUnsub=onSnapshot(query(collection(db,"chats",room,"messages"),orderBy("createdAt","asc"),limit(80)),s=>{let h="";s.forEach(x=>{const m=x.data(),mine=m.senderId===currentUser.uid;h+=`<div class="flex ${mine?'justify-end':'justify-start'}"><div class="dm-bubble px-4 py-2 rounded-2xl text-[15px] ${mine?'bg-blue-500 text-white rounded-br-sm':'bg-gray-100 text-black rounded-bl-sm'}"><div>${escapeHtml(m.text||"")}</div><div class="text-[10px] opacity-70 mt-1 text-right">${formatTime(m.createdAt)}</div></div></div>`});box.innerHTML=h||'<div class="p-8 text-center text-sm text-[var(--subtext)]">まだメッセージなし</div>';requestAnimationFrame(()=>box.scrollTop=box.scrollHeight)},e=>{box.innerHTML=`<div class="p-6 text-center text-sm text-red-500">DM接続失敗<br><button onclick="startChatWatcher(currentChatUser)" class="btn-soft mt-3">再接続</button></div>`})}
    $("chat-send-btn").onclick=async()=>{if(!requireAuth()||!currentChatUser)return;const input=$("chat-input"),text=input.value.trim();if(!text)return;const room=roomIdFor(currentUser.uid,currentChatUser),exp=new Date(Date.now()+7776e6),targetName=currentChatName||getAI(currentChatUser)?.name||"User";await addDoc(collection(db,"chats",room,"messages"),{text,senderId:currentUser.uid,createdAt:serverTimestamp(),expireAt:exp});await setDoc(doc(db,"dmRooms",room),{members:[currentUser.uid,currentChatUser],names:{[currentUser.uid]:myProfile.name||"自分",[currentChatUser]:targetName},lastMessage:text,updatedAt:serverTimestamp(),expireAt:exp},{merge:true});if(!isAIUid(currentChatUser))await addDoc(collection(db,"notif"),{to:currentChatUser,from:myProfile.name||"名無し",fromUid:currentUser.uid,type:"dm",read:false,createdAt:serverTimestamp(),expireAt:exp});input.value="";await progressMission("dm");await maybeAIReply(currentChatUser,text)};

    window.saveProfile=async()=>{if(!currentUser)return;const name=$("edit-name-input").value.trim();if(!name)return showToast("表示名を入力して");const icon=`https://api.dicebear.com/7.x/notionists/svg?seed=${currentUser.uid}_${Date.now()}`,profile={name,icon,xp:100,following:[],title:"見習い",aiEnabled:true,activeMissions:MISSION_POOL.map((m,i)=>({...m,id:`${m.type}_${i}`,progress:0})),expireAt:new Date(Date.now()+7776e6)};await setDoc(doc(db,"users",currentUser.uid),profile,{merge:true});myProfile=normalizeProfile(profile);$("profile-modal").classList.add("hidden");initLoggedIn();showToast("プロフィールを作成しました")};
    window.rerollIcon=async()=>{if(!requireAuth())return;const icon=`https://api.dicebear.com/7.x/notionists/svg?seed=${currentUser.uid}_${Date.now()}_${Math.random().toString(36).slice(2)}`;await updateDoc(doc(db,"users",currentUser.uid),{icon});myProfile.icon=icon;updateMyProfileUI()};
    window.switchProfileSubTab=t=>{currentProfileTab=t;$("tab-btn-posts").className=t==="posts"?'flex-1 text-center py-3 font-bold border-b-2 border-[var(--text)]':'flex-1 text-center py-3 font-bold text-[var(--subtext)]';$("tab-btn-likes").className=t==="likes"?'flex-1 text-center py-3 font-bold border-b-2 border-[var(--text)]':'flex-1 text-center py-3 font-bold text-[var(--subtext)]';t==="posts"?loadMyPosts(true):loadMyLikes()};
    async function loadMyPosts(){if(!currentUser)return;const c=$("my-timeline");c.innerHTML='<div class="p-6 text-center text-sm text-[var(--subtext)]">読み込み中...</div>';const s=await getDocs(query(collection(db,"logs"),where("uid","==",currentUser.uid),limit(60))),docs=[];s.forEach(d=>{const data=d.data();!data.isReply&&!data.replyTo&&docs.push({id:d.id,data})});docs.sort((a,b)=>(toDate(b.data.createdAt)?.getTime()||0)-(toDate(a.data.createdAt)?.getTime()||0));c.innerHTML=docs.slice(0,20).map(d=>buildPostHTML(d.id,d.data)).join("")||'<div class="p-6 text-center text-sm text-[var(--subtext)]">ポストなし</div>'}
    async function loadMyLikes(){if(!currentUser)return;const c=$("my-timeline");c.innerHTML='<div class="p-6 text-center text-sm text-[var(--subtext)]">読み込み中...</div>';const s=await getDocs(query(collection(db,"logs"),where("likes","array-contains",currentUser.uid),limit(30))),docs=[];s.forEach(d=>docs.push({id:d.id,data:d.data()}));docs.sort((a,b)=>(toDate(b.data.createdAt)?.getTime()||0)-(toDate(a.data.createdAt)?.getTime()||0));c.innerHTML=docs.map(d=>buildPostHTML(d.id,d.data)).join("")||'<div class="p-6 text-center text-sm text-[var(--subtext)]">いいねなし</div>'}
    window.openSettings=()=>$("settings-modal").classList.remove("hidden");window.toggleDarkMode=()=>{document.body.classList.toggle("dark");localStorage.setItem("theme",document.body.classList.contains("dark")?"dark":"light")};window.signOutApp=()=>{signOut(auth);$("settings-modal").classList.add("hidden")};
    window.switchTab=t=>{if(["dm","notif","profile","chat"].includes(t)&&!requireAuth())return;["home","explore","dm","notif","profile","other-profile","chat"].forEach(x=>{const el=$(`tab-${x}`);el&&el.classList.add("hidden")});const target=$(`tab-${t}`);target&&target.classList.remove("hidden");document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("nav-active"));const b=document.querySelector(`.nav-item[data-target="${t}"]`);b&&b.classList.add("nav-active");t==="explore"&&loadRanking();t==="dm"&&startDMListWatcher();t==="notif"&&loadNotifications(true);if(t==="profile"){updateMyProfileUI();currentProfileTab==="posts"?loadMyPosts():loadMyLikes()}if(t!=="chat"){chatUnsub?.();chatUnsub=null;window.scrollTo({top:0,behavior:"smooth"})}};
    document.addEventListener("gesturestart",e=>e.preventDefault());window.addEventListener("resize",()=>{document.body.style.width=window.innerWidth+"px"});
  </script>
</body>
</html>
