<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoG Board | Premium</title>
    <!-- OGP Meta Tags -->
    <meta property="og:title" content="LoG Board">
    <meta property="og:description" content="登録不要の完全匿名掲示板。思いついた瞬間に書き込めるミニマルな空間。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lo-g-8a620.web.app/board.html">
    <meta property="og:image" content="https://lo-g-8a620.web.app/assets/ogp.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link href="assets/css/core.css" rel="stylesheet">
    <style>
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="theme-core-dark">
    <!-- Header -->
    <header class="bg-black/50 backdrop-blur-md border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <a href="index.html" class="text-gray-400 hover:text-white transition shrink-0"><span
                        class="material-icons-round">arrow_back</span></a>
                <div class="min-w-0">
                    <h1 class="text-xl font-black truncate">LoG Board <span
                            class="text-xs text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full font-bold ml-1">Realtime</span>
                    </h1>
                    <p class="text-xs text-gray-500 mt-1">登録不要・匿名・リアルタイム同期のスレッド空間</p>
                </div>
            </div>
            <button onclick="toggleThreadModal()" class="btn-premium px-4 py-1.5 rounded-full text-sm shrink-0">スレッド作成</button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 space-y-4">
        <section class="glass-panel p-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
                <p class="text-sm text-white font-bold">LoG Board は全員で共有する匿名掲示板です。</p>
                <p class="text-xs text-gray-400 mt-1">スレッドとコメントはリアルタイムで同期されます。短く、読みやすく、ノイズ少なめに。</p>
            </div>
            <div class="text-xs">
                <span id="board-status"
                    class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-white/5 text-gray-300 border border-white/10">
                    <span class="material-icons-round text-[14px]">cloud_sync</span>
                    接続中...
                </span>
            </div>
        </section>

        <section class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="board-stats">
            <div class="glass-panel p-4">
                <div class="text-gray-500 text-xs uppercase tracking-widest">Threads</div>
                <div id="stat-threads" class="text-2xl font-black mt-2">0</div>
            </div>
            <div class="glass-panel p-4">
                <div class="text-gray-500 text-xs uppercase tracking-widest">Comments</div>
                <div id="stat-comments" class="text-2xl font-black mt-2">0</div>
            </div>
            <div class="glass-panel p-4">
                <div class="text-gray-500 text-xs uppercase tracking-widest">Mode</div>
                <div class="text-lg font-black mt-2">Anonymous</div>
            </div>
            <div class="glass-panel p-4">
                <div class="text-gray-500 text-xs uppercase tracking-widest">Sync</div>
                <div id="stat-sync" class="text-lg font-black mt-2">--</div>
            </div>
        </section>

        <section id="thread-list" class="space-y-4">
            <div class="text-center text-gray-400 mt-10 animate-pulse">読み込み中...</div>
        </section>
    </main>

    <!-- スレッド作成モーダル -->
    <div id="thread-modal"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
        <div class="glass-panel p-6 w-full max-w-md">
            <h2 class="text-xl font-bold mb-4 text-white">新しいスレッドを作成</h2>
            <input type="text" id="new-thread-title" maxlength="60" class="w-full input-glass rounded-xl p-4 mb-2"
                placeholder="スレッドのタイトル（60文字以内）">
            <div class="text-right text-xs text-gray-500 mb-4"><span id="title-count">0</span>/60</div>
            <textarea id="new-thread-desc" rows="3" maxlength="280" class="w-full input-glass rounded-xl p-4 mb-2 resize-none"
                placeholder="最初のコメント（任意 / 280文字以内）"></textarea>
            <div class="text-right text-xs text-gray-500 mb-4"><span id="desc-count">0</span>/280</div>
            <div class="flex justify-end gap-3 mt-2">
                <button onclick="toggleThreadModal()"
                    class="px-5 py-2 font-bold text-gray-400 hover:text-white transition">キャンセル</button>
                <button id="create-thread-btn" onclick="createThread()" class="px-6 py-2 btn-premium rounded-full">作成</button>
            </div>
        </div>
    </div>

    <!-- スレッド詳細（コメント画面） -->
    <div id="thread-view" class="hidden fixed inset-0 bg-[var(--bg-dark)] z-40 flex flex-col fade-in">
        <header class="bg-black/50 backdrop-blur-md border-b border-white/10 p-4 flex items-center gap-3 sticky top-0">
            <button onclick="closeThread()" class="text-gray-400 hover:text-white transition"><span
                    class="material-icons-round">arrow_back</span></button>
            <div class="min-w-0 flex-1">
                <h2 id="view-title" class="font-bold truncate text-lg"></h2>
                <p id="view-meta" class="text-xs text-gray-500 mt-1">匿名スレッド</p>
            </div>
        </header>
        <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
            <div class="text-center text-gray-500 mt-10">スレッドを読み込み中...</div>
        </div>
        <div class="fixed bottom-0 w-full border-t border-white/10 p-4 bg-black/80 backdrop-blur-md flex gap-3">
            <div class="max-w-3xl mx-auto w-full space-y-2">
                <div class="flex gap-3">
                    <input type="text" id="comment-input" maxlength="280" class="flex-1 input-glass rounded-full px-5 py-3"
                        placeholder="コメントを入力（完全匿名 / 280文字以内）">
                    <button id="send-comment-btn" onclick="addComment()"
                        class="btn-premium px-6 py-3 rounded-full flex items-center justify-center">
                        <span class="material-icons-round">send</span>
                    </button>
                </div>
                <div class="text-right text-xs text-gray-500"><span id="comment-count">0</span>/280</div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            auth,
            db,
            showToastText,
            signInAnonymously,
            onAuthStateChanged,
            collection,
            addDoc,
            query,
            orderBy,
            limit,
            onSnapshot,
            serverTimestamp,
            doc,
            setDoc,
            updateDoc,
            increment
        } from './assets/js/core.js';

        const THREADS_COLLECTION = 'board_threads';
        const MAX_TITLE = 60;
        const MAX_COMMENT = 280;

        let currentThreadId = null;
        let currentThreadTitle = '';
        let threadUnsub = null;
        let commentsUnsub = null;
        let isReady = false;
        let threads = [];

        const threadListEl = document.getElementById('thread-list');
        const commentListEl = document.getElementById('comment-list');
        const boardStatusEl = document.getElementById('board-status');
        const statThreadsEl = document.getElementById('stat-threads');
        const statCommentsEl = document.getElementById('stat-comments');
        const statSyncEl = document.getElementById('stat-sync');
        const titleInput = document.getElementById('new-thread-title');
        const descInput = document.getElementById('new-thread-desc');
        const commentInput = document.getElementById('comment-input');
        const createThreadBtn = document.getElementById('create-thread-btn');
        const sendCommentBtn = document.getElementById('send-comment-btn');

        function escapeHtml(text = '') {
            return text.replace(/[&<>'"]/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function setBoardStatus(label, icon = 'cloud_sync', tone = 'neutral') {
            const tones = {
                neutral: 'bg-white/5 text-gray-300 border-white/10',
                success: 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20',
                warning: 'bg-amber-500/10 text-amber-300 border-amber-500/20',
                danger: 'bg-rose-500/10 text-rose-300 border-rose-500/20'
            };
            boardStatusEl.className = `inline-flex items-center gap-1 px-3 py-1 rounded-full border ${tones[tone] || tones.neutral}`;
            boardStatusEl.innerHTML = `<span class="material-icons-round text-[14px]">${icon}</span>${escapeHtml(label)}`;
            statSyncEl.textContent = label;
        }

        function updateCounter(input, counterElId, max) {
            document.getElementById(counterElId).textContent = Math.min(input.value.length, max);
        }

        function formatDate(value) {
            if (!value) return 'just now';
            const date = value?.toDate ? value.toDate() : new Date(value);
            return new Intl.DateTimeFormat('ja-JP', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }).format(date);
        }

        function resetThreadForm() {
            titleInput.value = '';
            descInput.value = '';
            updateCounter(titleInput, 'title-count', MAX_TITLE);
            updateCounter(descInput, 'desc-count', MAX_COMMENT);
        }

        function updateStats() {
            statThreadsEl.textContent = threads.length;
            statCommentsEl.textContent = threads.reduce((sum, thread) => sum + (thread.commentCount || 0), 0);
        }

        function renderThreads() {
            updateStats();
            if (!threads.length) {
                threadListEl.innerHTML = `
                    <div class="glass-panel p-8 text-center text-gray-400">
                        <div class="text-lg font-bold text-white mb-2">まだスレッドはありません。</div>
                        <p class="text-sm text-gray-500">最初の一言を投げて、LoG Board を始めましょう。</p>
                    </div>
                `;
                return;
            }

            threadListEl.innerHTML = threads.map((thread) => `
                <button data-thread-id="${thread.id}" class="thread-card w-full text-left glass-panel p-5 cursor-pointer hover:border-white/30 transition group">
                    <div class="flex items-start justify-between gap-4">
                        <div class="min-w-0">
                            <h3 class="font-bold text-lg mb-2 text-white group-hover:text-emerald-400 transition truncate">${escapeHtml(thread.title)}</h3>
                            <p class="text-sm text-gray-400 leading-relaxed line-clamp-2">${escapeHtml(thread.lastComment || 'コメントなし')}</p>
                        </div>
                        <span class="text-[10px] uppercase tracking-[0.2em] text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-full shrink-0">live</span>
                    </div>
                    <div class="text-xs text-gray-500 mt-4 flex flex-wrap justify-between items-center gap-2">
                        <span class="bg-white/5 px-2 py-1 rounded flex items-center gap-1"><span class="material-icons-round text-[12px]">chat_bubble_outline</span> ${thread.commentCount || 0}</span>
                        <span>更新: ${escapeHtml(formatDate(thread.updatedAt || thread.createdAt))}</span>
                    </div>
                </button>
            `).join('');

            document.querySelectorAll('.thread-card').forEach((button) => {
                button.addEventListener('click', () => openThread(button.dataset.threadId));
            });
        }

        function renderComments(comments = []) {
            if (!comments.length) {
                commentListEl.innerHTML = `
                    <div class="glass-panel p-8 text-center text-gray-400">
                        <div class="text-lg font-bold text-white mb-2">まだコメントはありません。</div>
                        <p class="text-sm text-gray-500">このスレッドの最初の返信を送ってみましょう。</p>
                    </div>
                `;
                return;
            }

            commentListEl.innerHTML = comments.map((comment, index) => `
                <div class="glass-panel p-4">
                    <div class="text-xs text-gray-500 mb-2 flex justify-between gap-3">
                        <span class="text-emerald-400 font-bold">名無しさん [${index + 1}]</span>
                        <span>${escapeHtml(formatDate(comment.createdAt))}</span>
                    </div>
                    <div class="text-sm text-gray-200 whitespace-pre-wrap leading-relaxed break-words">${escapeHtml(comment.text)}</div>
                </div>
            `).join('');

            setTimeout(() => {
                commentListEl.scrollTop = commentListEl.scrollHeight;
            }, 50);
        }

        function bindThreadFeed() {
            if (threadUnsub) threadUnsub();
            threadUnsub = onSnapshot(
                query(collection(db, THREADS_COLLECTION), orderBy('updatedAt', 'desc'), limit(50)),
                (snapshot) => {
                    threads = snapshot.docs.map((threadDoc) => ({ id: threadDoc.id, ...threadDoc.data() }));
                    renderThreads();
                    setBoardStatus('同期済み', 'cloud_done', 'success');
                },
                (error) => {
                    console.error(error);
                    setBoardStatus('接続失敗', 'cloud_off', 'danger');
                    threadListEl.innerHTML = '<div class="glass-panel p-8 text-center text-rose-300">Board の読み込みに失敗しました。時間をおいて再読み込みしてください。</div>';
                    showToastText('Board の読み込みに失敗しました');
                }
            );
        }

        window.toggleThreadModal = () => {
            document.getElementById('thread-modal').classList.toggle('hidden');
        };

        window.createThread = async () => {
            const title = titleInput.value.trim();
            const desc = descInput.value.trim();

            if (!isReady) return showToastText('接続準備中です。少し待ってください');
            if (!title) return showToastText('タイトルを入力してください');
            if (title.length > MAX_TITLE) return showToastText(`タイトルは${MAX_TITLE}文字以内です`);
            if (desc.length > MAX_COMMENT) return showToastText(`コメントは${MAX_COMMENT}文字以内です`);

            createThreadBtn.disabled = true;
            createThreadBtn.classList.add('opacity-60');

            try {
                const threadRef = doc(collection(db, THREADS_COLLECTION));
                const now = serverTimestamp();
                await setDoc(threadRef, {
                    title,
                    lastComment: desc || 'スレッドが作成されました',
                    commentCount: desc ? 1 : 0,
                    createdAt: now,
                    updatedAt: now
                });

                if (desc) {
                    await addDoc(collection(db, THREADS_COLLECTION, threadRef.id, 'comments'), {
                        text: desc,
                        createdAt: serverTimestamp()
                    });
                }

                resetThreadForm();
                toggleThreadModal();
                showToastText('スレッドを作成しました');
            } catch (error) {
                console.error(error);
                showToastText('スレッド作成に失敗しました');
            } finally {
                createThreadBtn.disabled = false;
                createThreadBtn.classList.remove('opacity-60');
            }
        };

        window.openThread = (id) => {
            currentThreadId = id;
            const activeThread = threads.find((thread) => thread.id === id);
            currentThreadTitle = activeThread?.title || 'LoG Thread';
            document.getElementById('view-title').innerText = currentThreadTitle;
            document.getElementById('view-meta').innerText = `${activeThread?.commentCount || 0} comments • anonymous live thread`;
            document.getElementById('thread-view').classList.remove('hidden');
            commentListEl.innerHTML = '<div class="text-center text-gray-500 mt-10">コメントを読み込み中...</div>';

            if (commentsUnsub) commentsUnsub();
            commentsUnsub = onSnapshot(
                query(collection(db, THREADS_COLLECTION, id, 'comments'), orderBy('createdAt', 'asc'), limit(200)),
                (snapshot) => {
                    const comments = snapshot.docs.map((commentDoc) => ({ id: commentDoc.id, ...commentDoc.data() }));
                    renderComments(comments);
                    document.getElementById('view-meta').innerText = `${comments.length} comments • anonymous live thread`;
                },
                (error) => {
                    console.error(error);
                    commentListEl.innerHTML = '<div class="glass-panel p-8 text-center text-rose-300">コメントの読み込みに失敗しました。</div>';
                    showToastText('コメントの読み込みに失敗しました');
                }
            );
        };

        window.closeThread = () => {
            currentThreadId = null;
            currentThreadTitle = '';
            document.getElementById('thread-view').classList.add('hidden');
            if (commentsUnsub) {
                commentsUnsub();
                commentsUnsub = null;
            }
        };

        window.addComment = async () => {
            const text = commentInput.value.trim();
            if (!isReady) return showToastText('接続準備中です。少し待ってください');
            if (!text || !currentThreadId) return;
            if (text.length > MAX_COMMENT) return showToastText(`コメントは${MAX_COMMENT}文字以内です`);

            sendCommentBtn.disabled = true;
            sendCommentBtn.classList.add('opacity-60');

            try {
                await addDoc(collection(db, THREADS_COLLECTION, currentThreadId, 'comments'), {
                    text,
                    createdAt: serverTimestamp()
                });
                await updateDoc(doc(db, THREADS_COLLECTION, currentThreadId), {
                    lastComment: text,
                    commentCount: increment(1),
                    updatedAt: serverTimestamp()
                });
                commentInput.value = '';
                updateCounter(commentInput, 'comment-count', MAX_COMMENT);
            } catch (error) {
                console.error(error);
                showToastText('コメント送信に失敗しました');
            } finally {
                sendCommentBtn.disabled = false;
                sendCommentBtn.classList.remove('opacity-60');
            }
        };

        titleInput.addEventListener('input', () => updateCounter(titleInput, 'title-count', MAX_TITLE));
        descInput.addEventListener('input', () => updateCounter(descInput, 'desc-count', MAX_COMMENT));
        commentInput.addEventListener('input', () => updateCounter(commentInput, 'comment-count', MAX_COMMENT));
        commentInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                window.addComment();
            }
        });

        document.getElementById('thread-modal').addEventListener('click', (event) => {
            if (event.target.id === 'thread-modal') {
                toggleThreadModal();
            }
        });

        updateCounter(titleInput, 'title-count', MAX_TITLE);
        updateCounter(descInput, 'desc-count', MAX_COMMENT);
        updateCounter(commentInput, 'comment-count', MAX_COMMENT);
        setBoardStatus('匿名認証中...', 'shield', 'warning');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                isReady = true;
                bindThreadFeed();
                return;
            }

            try {
                await signInAnonymously(auth);
                isReady = true;
                bindThreadFeed();
            } catch (error) {
                console.error(error);
                setBoardStatus('認証失敗', 'error', 'danger');
                threadListEl.innerHTML = '<div class="glass-panel p-8 text-center text-rose-300">匿名認証に失敗しました。時間をおいて再読み込みしてください。</div>';
                showToastText('匿名認証に失敗しました');
            }
        });
    </script>
</body>

</html>
